    // ══════════════════════════════════════════════════════
    // TEST ANALYTICS PAGE
    // ══════════════════════════════════════════════════════
    const TA_TEST_CONFIG = {
        iq:           { label: 'IQ (CogniQ)',          color: '#6b4c9a', version: 'v1.0', scoreKey: 'iq',       maxScore: 160, severityFn: s => s >= 130 ? 'crit' : s >= 115 ? 'high' : s >= 85 ? 'mod' : 'low' },
        adhd:         { label: 'ADHD-screening',        color: '#2e6b9e', version: 'v1.1', scoreKey: 'totalPct', maxScore: 100, severityFn: s => s >= 70 ? 'crit' : s >= 50 ? 'high' : s >= 30 ? 'mod' : 'low' },
        autisme:      { label: 'Autisme (AQ-50)',       color: '#3a7d5e', version: 'v1.0', scoreKey: 't',        maxScore: 50,  severityFn: s => s >= 32 ? 'crit' : s >= 26 ? 'high' : s >= 16 ? 'mod' : 'low' },
        personlighed: { label: 'Personlighed (Big Five)',color:'#b8860b', version: 'v1.0', scoreKey: null,       maxScore: null,severityFn: () => null },
        stress:       { label: 'Stress/Udbrændthed',    color: '#c2553a', version: 'v1.0', scoreKey: 'pssTotal', maxScore: 40,  severityFn: s => s >= 27 ? 'crit' : s >= 21 ? 'high' : s >= 14 ? 'mod' : 'low' },
        eq:           { label: 'EQ (SSEIT)',            color: '#7a6b3a', version: 'v1.0', scoreKey: 'total',    maxScore: 165, severityFn: s => s >= 130 ? 'low' : s >= 100 ? 'mod' : 'high' },
        karriere:     { label: 'Karriere (RIASEC)',     color: '#5a7b4a', version: 'v1.0', scoreKey: null,       maxScore: null,severityFn: () => null },
    };

    function AnalyticsPage() {
        const [period, setPeriod] = useState(30);
        const [loading, setLoading] = useState(true);
        const [testData, setTestData] = useState({});
        const [expanded, setExpanded] = useState(null);
        const [ddTab, setDdTab] = useState('svardata');
        const [responses, setResponses] = useState([]);
        const [starts, setStarts] = useState([]);
        const [orders, setOrders] = useState([]);
        const [reportFb, setReportFb] = useState([]);
        const [viewAnswer, setViewAnswer] = useState(null);

        // Fetch all data
        useEffect(() => {
            fetchData();
        }, [period]);

        async function fetchData() {
            setLoading(true);
            try {
                const sb = getSB();
                const since = period === 0 ? '1970-01-01' : new Date(Date.now() - period * 86400000).toISOString();

                // Parallel queries
                const [resResults, resStarts, resOrders, resAccess, resFeedback] = await Promise.all([
                    sb.from('test_results').select('*').gte('completed_at', since).order('completed_at', { ascending: false }).limit(2000),
                    sb.from('test_starts').select('*').gte('started_at', since).order('started_at', { ascending: false }).limit(2000),
                    sb.from('orders').select('*').gte('created_at', since).eq('status', 'completed').order('created_at', { ascending: false }),
                    sb.from('report_access').select('*').gte('granted_at', since),
                    sb.from('report_feedback').select('*').order('created_at', { ascending: false }).limit(500),
                ]);

                const results = resResults.data || [];
                const startsArr = resStarts.data || [];
                const ordersArr = resOrders.data || [];
                const accessArr = resAccess.data || [];
                const feedbackArr = resFeedback.data || [];

                setResponses(results);
                setStarts(startsArr);
                setOrders(ordersArr);
                setReportFb(feedbackArr);

                // Build per-test aggregates
                const tests = {};
                for (const key of Object.keys(TA_TEST_CONFIG)) {
                    const cfg = TA_TEST_CONFIG[key];
                    const tr = results.filter(r => r.test_type === key);
                    const ts = startsArr.filter(s => s.test_type === key);
                    const ra = accessArr.filter(a => a.test_type === key);
                    const rf = feedbackArr.filter(f => f.test_type === key);
                    const ord = ordersArr.filter(o => o.test_type === key);

                    const scores = cfg.scoreKey ? tr.map(r => {
                        const rd = r.result_data;
                        return rd ? (typeof rd[cfg.scoreKey] === 'number' ? rd[cfg.scoreKey] : parseFloat(rd[cfg.scoreKey])) : null;
                    }).filter(s => s !== null && !isNaN(s)) : [];

                    const mean = scores.length ? scores.reduce((a, b) => a + b, 0) / scores.length : null;
                    const sd = scores.length > 1 ? Math.sqrt(scores.reduce((a, s) => a + Math.pow(s - mean, 2), 0) / (scores.length - 1)) : null;

                    const severities = { low: 0, mod: 0, high: 0, crit: 0 };
                    if (cfg.severityFn && scores.length) {
                        scores.forEach(s => {
                            const sev = cfg.severityFn(s);
                            if (sev && severities[sev] !== undefined) severities[sev]++;
                        });
                    }

                    const completed = ts.filter(s => s.completed).length;
                    const started = ts.length || tr.length;
                    const completionRate = started ? Math.round((tr.length / Math.max(started, tr.length)) * 100) : 0;

                    const revenue = ord.reduce((s, o) => s + (o.amount_dkk || 0), 0);
                    const convRate = tr.length ? (ra.length / tr.length * 100) : 0;
                    const avgRating = rf.length ? rf.reduce((s, f) => s + f.rating, 0) / rf.length : null;

                    // Durations
                    const durations = tr.map(r => r.result_data?.metadata?.duration_seconds).filter(d => d && d > 0);
                    const avgDuration = durations.length ? Math.round(durations.reduce((a, b) => a + b, 0) / durations.length) : null;

                    // Red flags (high severity in last 7 days)
                    const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString();
                    const recentResults = results.filter(r => r.test_type === key && r.completed_at > weekAgo);
                    const redFlags = cfg.scoreKey ? recentResults.filter(r => {
                        const s = r.result_data?.[cfg.scoreKey];
                        return s !== null && s !== undefined && (cfg.severityFn(s) === 'crit' || cfg.severityFn(s) === 'high');
                    }).length : 0;

                    tests[key] = {
                        results: tr, starts: ts, access: ra, feedback: rf, orders: ord,
                        scores, mean, sd, severities,
                        completionRate, revenue, convRate, avgRating, avgDuration, redFlags,
                        count: tr.length, startCount: started,
                        thisWeek: tr.filter(r => r.completed_at > weekAgo).length,
                    };
                }
                setTestData(tests);
            } catch (err) {
                console.error('Analytics fetch error:', err);
            }
            setLoading(false);
        }

        // Period labels
        const periodOpts = [{ v: 7, l: '7d' }, { v: 30, l: '30d' }, { v: 90, l: '90d' }, { v: 0, l: 'Alt' }];

        // Totals
        const totalCompleted = Object.values(testData).reduce((s, t) => s + t.count, 0);
        const totalStarts = Object.values(testData).reduce((s, t) => s + t.startCount, 0);
        const totalCompletionRate = totalStarts ? Math.round(totalCompleted / totalStarts * 100) : 0;
        const totalReportsSold = Object.values(testData).reduce((s, t) => s + t.access.length, 0);
        const totalRevenue = Object.values(testData).reduce((s, t) => s + t.revenue, 0);
        const allFeedback = reportFb;
        const totalAvgRating = allFeedback.length ? (allFeedback.reduce((s, f) => s + f.rating, 0) / allFeedback.length).toFixed(1) : '—';
        const totalRedFlags = Object.values(testData).reduce((s, t) => s + t.redFlags, 0);

        function toggleRow(key) {
            if (expanded === key) { setExpanded(null); } else { setExpanded(key); setDdTab('svardata'); }
        }

        function fmtDuration(sec) {
            if (!sec) return '—';
            return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
        }

        function getScoreBadgeClass(testType, score) {
            const cfg = TA_TEST_CONFIG[testType];
            if (!cfg || !cfg.severityFn) return '';
            const sev = cfg.severityFn(score);
            if (sev === 'crit') return 'red';
            if (sev === 'high') return 'orange';
            if (sev === 'mod') return 'yellow';
            return 'green';
        }

        function getSeverityLabel(testType, score) {
            const cfg = TA_TEST_CONFIG[testType];
            if (!cfg || !cfg.severityFn) return '—';
            const sev = cfg.severityFn(score);
            return sev === 'crit' ? 'Kritisk' : sev === 'high' ? 'Høj' : sev === 'mod' ? 'Moderat' : 'Lav';
        }

        function getMainScore(result) {
            const cfg = TA_TEST_CONFIG[result.test_type];
            if (!cfg || !cfg.scoreKey || !result.result_data) return null;
            return result.result_data[cfg.scoreKey];
        }

        // ── Drill-down: svardata for expanded test ──
        function renderSvardata() {
            const tt = expanded;
            const items = (testData[tt]?.results || []).slice(0, 50);
            return (
                <div>
                    <table className="ta-data-table">
                        <thead><tr>
                            <th>Dato</th><th>Bruger</th><th>Score</th><th>Severity</th>
                            <th>Tid</th><th>Device</th><th>Version</th><th></th>
                        </tr></thead>
                        <tbody>
                            {items.map(r => {
                                const score = getMainScore(r);
                                const dur = r.result_data?.metadata?.duration_seconds;
                                const device = r.result_data?.metadata?.device;
                                const ver = r.result_data?.test_version || '—';
                                const isSpeedrun = dur && dur < 120;
                                return (
                                    <tr key={r.id}>
                                        <td>{fmtDateTime(r.completed_at)}</td>
                                        <td style={{ fontWeight: r.user_id ? 500 : 400, color: r.user_id ? 'var(--text)' : 'var(--text-3)' }}>
                                            {r.user_id ? '👤' : 'Anonym'} {r.anonymous_token ? <span style={{ fontSize: '.65rem', color: 'var(--text-4)' }}>{r.anonymous_token.slice(0, 5)}</span> : ''}
                                        </td>
                                        <td>{score !== null && score !== undefined ? <span className={`ta-score-badge ${getScoreBadgeClass(tt, score)}`}>{typeof score === 'number' ? Math.round(score) : score}</span> : '—'}</td>
                                        <td>{score !== null && score !== undefined ? <span className={`ta-score-badge ${getScoreBadgeClass(tt, score)}`}>{getSeverityLabel(tt, score)}</span> : '—'}</td>
                                        <td className={isSpeedrun ? 'ta-time-warn' : ''}>{fmtDuration(dur)} {isSpeedrun ? '⚡' : ''}</td>
                                        <td>{device === 'mobile' ? '📱' : device === 'tablet' ? '📱' : device === 'desktop' ? '💻' : '—'}</td>
                                        <td style={{ fontSize: '.72rem', color: 'var(--text-3)' }}>{ver}</td>
                                        <td><button className="ta-btn-view" onClick={e => { e.stopPropagation(); setViewAnswer(r); }}>Se svar</button></td>
                                    </tr>
                                );
                            })}
                            {items.length === 0 && <tr><td colSpan="8" style={{ textAlign: 'center', color: 'var(--text-3)', padding: '2rem' }}>Ingen data i perioden</td></tr>}
                        </tbody>
                    </table>
                </div>
            );
        }

        // ── Drill-down: item-analyse ──
        function renderItems() {
            const tt = expanded;
            const results = testData[tt]?.results || [];
            if (!results.length) return <p style={{ color: 'var(--text-3)', fontSize: '.85rem' }}>Ingen data</p>;

            // Compute per-item stats from answers
            const itemStats = {};
            const totalScores = [];
            results.forEach(r => {
                const answers = r.result_data?.answers;
                const score = getMainScore(r);
                if (score !== null) totalScores.push(score);
                if (!answers || !Array.isArray(answers)) return;
                answers.forEach(a => {
                    const id = a.item_id || a.id || a.q;
                    const key = String(id);
                    if (!itemStats[key]) itemStats[key] = { values: [], times: [], text: a.text || '', count: 0 };
                    const val = a.chosen ?? a.value ?? a.chosenIdx;
                    if (val !== null && val !== undefined) {
                        itemStats[key].values.push(typeof val === 'number' ? val : parseInt(val));
                        itemStats[key].count++;
                    }
                    if (a.ms) itemStats[key].times.push(a.ms);
                });
            });

            const itemKeys = Object.keys(itemStats).sort((a, b) => {
                const na = parseInt(a.replace(/\D/g, '')), nb = parseInt(b.replace(/\D/g, ''));
                return (isNaN(na) ? 999 : na) - (isNaN(nb) ? 999 : nb);
            });

            return (
                <div>
                    <div style={{ display: 'grid', gridTemplateColumns: '45px 1fr 70px 65px 55px', gap: '10px', padding: '0 1rem .5rem', fontSize: '.65rem', fontWeight: 700, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '.05em' }}>
                        <span>ID</span><span>Spørgsmål</span><span style={{ textAlign: 'center' }}>Gns.</span><span style={{ textAlign: 'center' }}>Gns. tid</span><span style={{ textAlign: 'center' }}>N</span>
                    </div>
                    {itemKeys.slice(0, 40).map(key => {
                        const st = itemStats[key];
                        const avg = st.values.length ? (st.values.reduce((a, b) => a + b, 0) / st.values.length).toFixed(2) : '—';
                        const avgMs = st.times.length ? (st.times.reduce((a, b) => a + b, 0) / st.times.length / 1000).toFixed(1) + 's' : '—';
                        return (
                            <div key={key} style={{ display: 'grid', gridTemplateColumns: '45px 1fr 70px 65px 55px', alignItems: 'center', gap: '10px', padding: '.55rem 1rem', background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: '8px', marginBottom: '4px' }}>
                                <div className="ta-item-id">{key.startsWith('q') ? key : 'q' + key}</div>
                                <div className="ta-item-text" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{st.text || '—'}</div>
                                <div style={{ textAlign: 'center', fontWeight: 700, fontSize: '.85rem' }}>{avg}</div>
                                <div style={{ textAlign: 'center', fontSize: '.78rem', color: 'var(--text-3)' }}>{avgMs}</div>
                                <div style={{ textAlign: 'center', fontSize: '.78rem', color: 'var(--text-3)' }}>{st.count}</div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // ── Drill-down: normdata ──
        function renderNormdata() {
            const tt = expanded;
            const results = testData[tt]?.results || [];
            const ageGroups = ['13-15', '16-17', '18-24', '25-34', '35-44', '45-54', '55-64', '65+'];
            const genders = ['male', 'female'];

            // Build heatmap counts
            const counts = {};
            ageGroups.forEach(ag => { counts[ag] = { male: 0, female: 0, unknown: 0 }; });
            results.forEach(r => {
                const demo = r.result_data?.demographics;
                const ag = demo?.age_group || r.result_data?.age_group;
                const g = demo?.gender || 'unknown';
                if (ag && counts[ag]) {
                    counts[ag][g === 'male' ? 'male' : g === 'female' ? 'female' : 'unknown']++;
                }
            });

            function hmClass(n) { return n >= 100 ? 'ta-hm-green' : n >= 30 ? 'ta-hm-yellow' : 'ta-hm-red'; }

            return (
                <div className="ta-norm-grid">
                    <div className="ta-norm-card">
                        <h3>Normdata-dækning ({TA_TEST_CONFIG[tt]?.label})</h3>
                        <div style={{ fontSize: '.72rem', color: 'var(--text-3)', marginBottom: '.75rem' }}>
                            Celler med &lt; 30 (rød) har utilstrækkelig data til percentilberegning
                        </div>
                        <div className="ta-heatmap">
                            <div className="ta-hm-header"></div><div className="ta-hm-header">♂ Mand</div><div className="ta-hm-header">♀ Kvinde</div>
                            {ageGroups.map(ag => (
                                <React.Fragment key={ag}>
                                    <div className="ta-hm-label">{ag}</div>
                                    <div className={`ta-hm-cell ${hmClass(counts[ag]?.male || 0)}`}>{counts[ag]?.male || 0}</div>
                                    <div className={`ta-hm-cell ${hmClass(counts[ag]?.female || 0)}`}>{counts[ag]?.female || 0}</div>
                                </React.Fragment>
                            ))}
                        </div>
                        <div style={{ display: 'flex', gap: '10px', marginTop: '.75rem', fontSize: '.65rem' }}>
                            <span style={{ display: 'flex', alignItems: 'center', gap: '3px' }}><span style={{ width: 8, height: 8, borderRadius: 2, background: '#fce4ec', display: 'inline-block' }}></span><span style={{ color: 'var(--text-3)' }}>&lt; 30</span></span>
                            <span style={{ display: 'flex', alignItems: 'center', gap: '3px' }}><span style={{ width: 8, height: 8, borderRadius: 2, background: '#faf5eb', display: 'inline-block' }}></span><span style={{ color: 'var(--text-3)' }}>30-100</span></span>
                            <span style={{ display: 'flex', alignItems: 'center', gap: '3px' }}><span style={{ width: 8, height: 8, borderRadius: 2, background: '#e8f0ec', display: 'inline-block' }}></span><span style={{ color: 'var(--text-3)' }}>&gt; 100</span></span>
                        </div>
                    </div>
                    <div className="ta-norm-card">
                        <h3>Statistik</h3>
                        <div style={{ fontSize: '.85rem', lineHeight: 2 }}>
                            <div><strong>N:</strong> {testData[tt]?.count || 0}</div>
                            <div><strong>Gennemsnit:</strong> {testData[tt]?.mean ? testData[tt].mean.toFixed(1) : '—'}</div>
                            <div><strong>SD:</strong> {testData[tt]?.sd ? testData[tt].sd.toFixed(1) : '—'}</div>
                            <div><strong>Outliers flagget:</strong> {(testData[tt]?.results || []).filter(r => r.outlier_flags && r.outlier_flags.length > 0).length}</div>
                            <div><strong>Ekskluderet fra norms:</strong> {(testData[tt]?.results || []).filter(r => r.excluded_from_norms).length}</div>
                        </div>
                    </div>
                </div>
            );
        }

        // ── Drill-down: rapporter & feedback ──
        function renderRapporter() {
            const tt = expanded;
            const td = testData[tt] || {};
            const fb = td.feedback || [];
            const sortedFb = [...fb].sort((a, b) => a.rating - b.rating);

            return (
                <div>
                    <div className="ta-report-stats">
                        <div className="ta-report-stat">
                            <div className="ta-rs-label">Solgte rapporter</div>
                            <div className="ta-rs-value">{td.access?.length || 0}</div>
                        </div>
                        <div className="ta-report-stat">
                            <div className="ta-rs-label">Konvertering</div>
                            <div className="ta-rs-value">{td.convRate ? td.convRate.toFixed(1) + '%' : '—'}</div>
                        </div>
                        <div className="ta-report-stat">
                            <div className="ta-rs-label">Revenue</div>
                            <div className="ta-rs-value" style={{ color: '#8b6b00' }}>{fmtNumber(td.revenue || 0)} kr</div>
                        </div>
                        <div className="ta-report-stat">
                            <div className="ta-rs-label">Gns. rating</div>
                            <div className="ta-rs-value" style={{ color: '#b8860b' }}>{td.avgRating ? td.avgRating.toFixed(1) + ' ★' : '—'}</div>
                            <div className="ta-rs-sub">{fb.length} ratings</div>
                        </div>
                    </div>
                    {sortedFb.length > 0 && (
                        <div>
                            <div style={{ fontSize: '.78rem', fontWeight: 600, color: 'var(--text-3)', marginBottom: '.6rem' }}>Seneste feedback (laveste først)</div>
                            {sortedFb.slice(0, 10).map(f => (
                                <div className="ta-feedback-item" key={f.id}>
                                    <div style={{ flexShrink: 0, textAlign: 'center' }}>
                                        <div className="ta-fi-stars" style={{ color: f.rating <= 2 ? '#c2553a' : f.rating <= 3 ? '#b8860b' : '#2c5f4b' }}>
                                            {'★'.repeat(f.rating) + '☆'.repeat(5 - f.rating)}
                                        </div>
                                        <div className="ta-fi-date">{fmtDate(f.created_at)}</div>
                                    </div>
                                    <div>
                                        <div className="ta-fi-comment">{f.comment || <em style={{ color: 'var(--text-4)' }}>Ingen kommentar</em>}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                    {sortedFb.length === 0 && <p style={{ color: 'var(--text-3)', fontSize: '.85rem' }}>Ingen feedback endnu</p>}
                </div>
            );
        }

        // ── Drill-down: funnel ──
        function renderFunnel() {
            const tt = expanded;
            const td = testData[tt] || {};
            const started = td.startCount || 0;
            const completed = td.count || 0;
            const reportsSold = td.access?.length || 0;

            const steps = [
                { label: 'Startede', n: started, pct: 100, color: TA_TEST_CONFIG[tt]?.color || '#2c5f4b' },
                { label: 'Gennemførte', n: completed, pct: started ? Math.round(completed / started * 100) : 0, color: TA_TEST_CONFIG[tt]?.color || '#2c5f4b' },
                { label: 'Købte rapport', n: reportsSold, pct: started ? Math.round(reportsSold / started * 100) : 0, color: '#2c5f4b' },
            ];

            // Device breakdown
            const mobileStarts = td.starts?.filter(s => s.user_agent && /mobile|iphone|android/i.test(s.user_agent)) || [];
            const desktopStarts = td.starts?.filter(s => s.user_agent && !/mobile|iphone|android/i.test(s.user_agent)) || [];
            const mobileCompleted = mobileStarts.filter(s => s.completed).length;
            const desktopCompleted = desktopStarts.filter(s => s.completed).length;

            return (
                <div>
                    <div style={{ fontSize: '.78rem', fontWeight: 600, color: 'var(--text-3)', marginBottom: '1rem' }}>{TA_TEST_CONFIG[tt]?.label} — brugerflow (seneste {period || 'alle'} dage)</div>
                    {steps.map((step, i) => (
                        <React.Fragment key={i}>
                            <div className="ta-funnel-step">
                                <div className="ta-funnel-label">{step.label}</div>
                                <div style={{ flex: 1 }}>
                                    <div className="ta-funnel-bar" style={{ width: Math.max(step.pct, 3) + '%', background: `linear-gradient(90deg, ${step.color}, ${step.color}88)` }}>
                                        <span>{fmtNumber(step.n)}</span>
                                    </div>
                                </div>
                                <div className="ta-funnel-pct">{step.pct}%</div>
                            </div>
                            {i < steps.length - 1 && <div className="ta-funnel-drop">↓ {100 - steps[i + 1].pct}% drop</div>}
                        </React.Fragment>
                    ))}

                    <div style={{ marginTop: '1.5rem', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                        <div className="ta-norm-card">
                            <h3>Completion per device</h3>
                            <div style={{ display: 'flex', gap: '1.5rem' }}>
                                <div>
                                    <div style={{ fontSize: '1.25rem', fontWeight: 700 }}>{mobileStarts.length ? Math.round(mobileCompleted / mobileStarts.length * 100) : 0}%</div>
                                    <div style={{ fontSize: '.72rem', color: 'var(--text-3)' }}>📱 Mobil (n={mobileStarts.length})</div>
                                </div>
                                <div>
                                    <div style={{ fontSize: '1.25rem', fontWeight: 700, color: '#2c5f4b' }}>{desktopStarts.length ? Math.round(desktopCompleted / desktopStarts.length * 100) : 0}%</div>
                                    <div style={{ fontSize: '.72rem', color: 'var(--text-3)' }}>💻 Desktop (n={desktopStarts.length})</div>
                                </div>
                            </div>
                        </div>
                        <div className="ta-norm-card">
                            <h3>Top referrers</h3>
                            {(() => {
                                const refs = {};
                                (td.starts || []).forEach(s => {
                                    const r = s.referrer ? new URL(s.referrer).hostname.replace('www.', '') : 'direkte';
                                    if (!refs[r]) refs[r] = { total: 0, completed: 0 };
                                    refs[r].total++;
                                    if (s.completed) refs[r].completed++;
                                });
                                const sorted = Object.entries(refs).sort((a, b) => b[1].total - a[1].total).slice(0, 5);
                                if (!sorted.length) return <span style={{ fontSize: '.8rem', color: 'var(--text-3)' }}>Ingen referrer-data</span>;
                                return sorted.map(([host, data]) => (
                                    <div key={host} style={{ display: 'flex', justifyContent: 'space-between', fontSize: '.8rem', padding: '.15rem 0' }}>
                                        <span style={{ color: 'var(--text-2)' }}>{host}</span>
                                        <span style={{ fontWeight: 600 }}>{data.total} <span style={{ color: 'var(--text-4)', fontWeight: 400 }}>({data.total ? Math.round(data.completed / data.total * 100) : 0}%)</span></span>
                                    </div>
                                ));
                            })()}
                        </div>
                    </div>
                </div>
            );
        }

        // ── Answer detail modal ──
        function renderAnswerModal() {
            if (!viewAnswer) return null;
            const r = viewAnswer;
            const answers = r.result_data?.answers || [];
            const meta = r.result_data?.metadata;
            return (
                <div className="admin-modal-overlay" onClick={() => setViewAnswer(null)}>
                    <div className="admin-modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 600 }}>
                        <div className="admin-modal-header">
                            <h3>Svardetaljer — {TA_TEST_CONFIG[r.test_type]?.label || r.test_type}</h3>
                            <button className="admin-modal-close" onClick={() => setViewAnswer(null)}>{Icons.close}</button>
                        </div>
                        <div className="admin-modal-body">
                            {meta && (
                                <div style={{ marginBottom: '1rem', display: 'flex', gap: '1rem', flexWrap: 'wrap', fontSize: '.78rem', color: 'var(--text-3)' }}>
                                    {meta.device && <span>📱 {meta.device}</span>}
                                    {meta.language && <span>🌐 {meta.language}</span>}
                                    {meta.duration_seconds && <span>⏱ {fmtDuration(meta.duration_seconds)}</span>}
                                    {r.result_data?.test_version && <span>📋 {r.result_data.test_version}</span>}
                                </div>
                            )}
                            {answers.map((a, i) => {
                                const id = a.item_id || a.id || a.q || i;
                                const val = a.chosen ?? a.value ?? a.chosenIdx;
                                return (
                                    <div className="ta-answer-item" key={i}>
                                        <div className="ta-answer-id">{String(id).startsWith('q') ? id : 'q' + id}</div>
                                        <div style={{ flex: 1 }}>
                                            <span className="ta-answer-val">{val !== null && val !== undefined ? val : '—'}</span>
                                            {a.text && <span style={{ marginLeft: 8, color: 'var(--text-3)', fontSize: '.75rem' }}>{a.text.slice(0, 80)}{a.text.length > 80 ? '…' : ''}</span>}
                                        </div>
                                        <div className="ta-answer-ms">{a.ms ? (a.ms / 1000).toFixed(1) + 's' : ''}</div>
                                    </div>
                                );
                            })}
                            {answers.length === 0 && <p style={{ color: 'var(--text-3)' }}>Ingen svardata</p>}
                        </div>
                    </div>
                </div>
            );
        }

        if (loading) {
            return (
                <div>
                    <div className="admin-page-header"><h1 className="admin-page-title">Test Analytics</h1></div>
                    <div className="admin-loading"><div className="admin-spinner"></div>Henter data...</div>
                </div>
            );
        }

        return (
            <div>
                {/* Header */}
                <div className="ta-topbar">
                    <div><h1 className="admin-page-title">Test Analytics</h1><div className="admin-page-subtitle">Overblik over alle tests, svardata og konvertering</div></div>
                    <div className="ta-period">
                        {periodOpts.map(p => (
                            <button key={p.v} className={period === p.v ? 'active' : ''} onClick={() => setPeriod(p.v)}>{p.l}</button>
                        ))}
                    </div>
                </div>

                {/* Red flag banner */}
                {totalRedFlags > 0 && (
                    <div className="ta-rfb">
                        <span style={{ fontSize: '1.2rem' }}>⚠️</span>
                        <div style={{ flex: 1 }}>
                            <div className="ta-rfb-title">{totalRedFlags} kliniske red flags denne uge</div>
                            <div className="ta-rfb-detail">Scores over klinisk cutoff fordelt på tests</div>
                        </div>
                        <div className="ta-rfb-chips">
                            {Object.entries(testData).filter(([, t]) => t.redFlags > 0).map(([key, t]) => (
                                <div className="ta-rfb-chip" key={key}><span className="count">{t.redFlags}</span> {TA_TEST_CONFIG[key]?.label?.split(' ')[0]}</div>
                            ))}
                        </div>
                    </div>
                )}

                {/* Stat cards */}
                <div className="ta-stat-cards">
                    <div className="ta-stat-card">
                        <div className="ta-sc-label">Tests gennemført</div>
                        <div className="ta-sc-value">{fmtNumber(totalCompleted)}</div>
                    </div>
                    <div className="ta-stat-card">
                        <div className="ta-sc-label">Gennemførelsesrate</div>
                        <div className="ta-sc-value">{totalCompletionRate}%</div>
                    </div>
                    <div className="ta-stat-card">
                        <div className="ta-sc-label">Rapporter solgt</div>
                        <div className="ta-sc-value">{fmtNumber(totalReportsSold)}</div>
                    </div>
                    <div className="ta-stat-card">
                        <div className="ta-sc-label">Revenue</div>
                        <div className="ta-sc-value">{fmtNumber(totalRevenue)} <span style={{ fontSize: '.85rem', fontWeight: 500 }}>kr</span></div>
                    </div>
                    <div className="ta-stat-card">
                        <div className="ta-sc-label">Rapport-rating</div>
                        <div className="ta-sc-value">{totalAvgRating} <span style={{ fontSize: '.85rem' }}>★</span></div>
                        <div className="ta-sc-sub">{allFeedback.length} ratings</div>
                    </div>
                </div>

                {/* Overview table */}
                <div className="admin-panel">
                    <div className="admin-panel-header">
                        <span className="admin-panel-title">Tests — overblik</span>
                    </div>
                    <table className="ta-ov-table">
                        <thead><tr>
                            <th style={{ width: 30 }}></th>
                            <th>Test</th><th>Gennemf.</th><th>Completion</th>
                            <th>Gns. score</th><th>Severity</th>
                            <th>Konvert.</th><th>Revenue</th><th>Rating</th><th>Red flags</th>
                        </tr></thead>
                        <tbody>
                            {Object.entries(TA_TEST_CONFIG).map(([key, cfg]) => {
                                const td2 = testData[key] || {};
                                const isExp = expanded === key;
                                return (
                                    <React.Fragment key={key}>
                                        <tr className={isExp ? 'ta-expanded' : ''} onClick={() => toggleRow(key)}>
                                            <td><svg className="ta-expand-arrow" viewBox="0 0 16 16"><polyline points="6 4 10 8 6 12"/></svg></td>
                                            <td>
                                                <div className="ta-test-cell">
                                                    <div className="ta-test-dot" style={{ background: cfg.color }}></div>
                                                    <div>
                                                        <span className="ta-test-label">{cfg.label}</span>
                                                        <span className="ta-test-ver">{cfg.version}</span>
                                                        <span className="ta-badge-live">Live</span>
                                                    </div>
                                                </div>
                                            </td>
                                            <td>
                                                <div className="ta-metric-main">{fmtNumber(td2.count || 0)}</div>
                                                <div className="ta-metric-sub">+{td2.thisWeek || 0} denne uge</div>
                                            </td>
                                            <td>
                                                <div style={{ fontWeight: 600, fontSize: '.85rem', color: (td2.completionRate || 0) >= 75 ? '#2c5f4b' : (td2.completionRate || 0) >= 60 ? '#b8860b' : '#c2553a' }}>{td2.completionRate || 0}%</div>
                                                <div className="ta-completion-bar"><div className="ta-completion-fill" style={{ width: (td2.completionRate || 0) + '%', background: (td2.completionRate || 0) >= 75 ? '#2c5f4b' : (td2.completionRate || 0) >= 60 ? '#b8860b' : '#c2553a' }}></div></div>
                                            </td>
                                            <td>
                                                {td2.mean ? <><div className="ta-metric-main">{td2.mean.toFixed(1)}</div><div className="ta-metric-sub">SD: {td2.sd ? td2.sd.toFixed(1) : '—'}</div></> : <span style={{ color: 'var(--text-4)' }}>—</span>}
                                            </td>
                                            <td>
                                                {cfg.scoreKey && td2.scores?.length ? (
                                                    <div className="ta-severity-row">
                                                        {['low', 'mod', 'high', 'crit'].map(s => {
                                                            const pct = td2.scores.length ? Math.round(td2.severities[s] / td2.scores.length * 100) : 0;
                                                            if (pct === 0) return null;
                                                            return <div key={s} className={`ta-sev ta-sev-${s}`} style={{ width: Math.max(pct * 0.6, 14) + 'px' }}>{pct}%</div>;
                                                        })}
                                                    </div>
                                                ) : <span style={{ fontSize: '.72rem', color: 'var(--text-4)' }}>N/A</span>}
                                            </td>
                                            <td><span className="ta-conv">{td2.convRate ? td2.convRate.toFixed(1) + '%' : '—'}</span></td>
                                            <td><span className="ta-revenue">{td2.revenue ? fmtNumber(td2.revenue) + ' kr' : '—'}</span></td>
                                            <td>
                                                {td2.avgRating ? <><span style={{ color: '#b8860b' }}>★ {td2.avgRating.toFixed(1)}</span><div className="ta-metric-sub">{td2.feedback?.length || 0} stk</div></> : <span style={{ color: 'var(--text-4)' }}>—</span>}
                                            </td>
                                            <td><span className={`ta-red-flag ${td2.redFlags > 0 ? 'has' : 'none'}`}>{td2.redFlags > 0 ? td2.redFlags : '—'}</span></td>
                                        </tr>
                                        {isExp && (
                                            <tr><td colSpan="10" style={{ padding: 0 }}>
                                                <div className="ta-drilldown">
                                                    <div className="ta-dd-header">
                                                        <div className="ta-dd-title">
                                                            <div className="ta-test-dot" style={{ background: cfg.color, width: 10, height: 10 }}></div>
                                                            {cfg.label} — detaljeret analyse
                                                        </div>
                                                        <button className="ta-dd-close" onClick={e => { e.stopPropagation(); setExpanded(null); }}>✕</button>
                                                    </div>
                                                    <div className="ta-tabs">
                                                        {[
                                                            { id: 'svardata', label: 'Svardata', badge: td2.count },
                                                            { id: 'items', label: 'Item-analyse' },
                                                            { id: 'normdata', label: 'Normdata' },
                                                            { id: 'rapporter', label: 'Rapporter', badge: td2.access?.length },
                                                            { id: 'funnel', label: 'Funnel & drop-off' },
                                                        ].map(tab => (
                                                            <button key={tab.id} className={`ta-tab ${ddTab === tab.id ? 'active' : ''}`} onClick={e => { e.stopPropagation(); setDdTab(tab.id); }}>
                                                                {tab.label} {tab.badge !== undefined ? <span className="ta-tab-badge">{tab.badge}</span> : ''}
                                                            </button>
                                                        ))}
                                                    </div>
                                                    <div className={`ta-tab-content ${ddTab === 'svardata' ? 'active' : ''}`}>{ddTab === 'svardata' && renderSvardata()}</div>
                                                    <div className={`ta-tab-content ${ddTab === 'items' ? 'active' : ''}`}>{ddTab === 'items' && renderItems()}</div>
                                                    <div className={`ta-tab-content ${ddTab === 'normdata' ? 'active' : ''}`}>{ddTab === 'normdata' && renderNormdata()}</div>
                                                    <div className={`ta-tab-content ${ddTab === 'rapporter' ? 'active' : ''}`}>{ddTab === 'rapporter' && renderRapporter()}</div>
                                                    <div className={`ta-tab-content ${ddTab === 'funnel' ? 'active' : ''}`}>{ddTab === 'funnel' && renderFunnel()}</div>
                                                </div>
                                            </td></tr>
                                        )}
                                    </React.Fragment>
                                );
                            })}
                        </tbody>
                    </table>
                </div>

                {/* Answer modal */}
                {renderAnswerModal()}
            </div>
        );
    }

    // ══════════════════════════════════════════════════════
    // MAIN APP
    // ══════════════════════════════════════════════════════
    function AdminApp() {
        const [authed, setAuthed] = useState(false);
        const [user, setUser] = useState(null);
        const [activePage, setActivePage] = useState('dashboard');
        const [stats, setStats] = useState(null);
        const [selectedUserId, setSelectedUserId] = useState(null);

        // Load dashboard stats when authenticated
        useEffect(() => {
            if (!authed) return;
            (async () => {
                try {
                    const sb = getSB();
                    const { data, error } = await sb.rpc('admin_dashboard_stats');
                    if (error) throw error;
                    setStats(data);
                } catch (err) { console.error('Dashboard stats error:', err); }
            })();
        }, [authed]);

        function handleAuth(u) {
            setUser(u);
            setAuthed(true);
        }

        async function handleLogout() {
            const sb = getSB();
            await sb.auth.signOut();
            setAuthed(false);
            setUser(null);
            window.location.reload();
        }

        if (!authed) return <AuthGate onAuth={handleAuth} />;

        const navItems = [
            { id: 'dashboard', icon: Icons.dashboard, label: 'Dashboard' },
            { id: 'users', icon: Icons.users, label: 'Brugere' },
            { id: 'anonymous', icon: Icons.anonymous, label: 'Anonyme' },
            { id: 'coupons', icon: Icons.coupons, label: 'Kuponer' },
            { id: 'analytics', icon: Icons.analytics, label: 'Test Analytics' },
            { id: 'settings', icon: Icons.settings, label: 'Indstillinger' },
        ];

        return (
            <div className="admin-shell">
                {/* Sidebar */}
                <nav className="admin-sidebar">
                    <div className="admin-sidebar-brand">
                        <h2>Hjernebarometeret</h2>
                        <span>Admin Panel</span>
                    </div>
                    <div className="admin-nav">
                        {navItems.map(item => (
                            <button
                                key={item.id}
                                className={`admin-nav-item ${activePage === item.id ? 'active' : ''}`}
                                onClick={() => setActivePage(item.id)}
                            >
                                {item.icon}
                                {item.label}
                            </button>
                        ))}
                    </div>
                    <div className="admin-sidebar-footer">
                        <div style={{ fontSize: '.75rem', color: 'rgba(255,255,255,.35)', marginBottom: '.4rem' }}>
                            {user?.email}
                        </div>
                        <button onClick={handleLogout}>Log ud</button>
                        <span style={{ margin: '0 .5rem', color: 'rgba(255,255,255,.2)' }}>{'\u00b7'}</span>
                        <button onClick={() => window.location.href = '/'}>Til forsiden</button>
                    </div>
                </nav>

                {/* Main */}
                <main className="admin-main">
                    {activePage === 'dashboard' && <DashboardPage stats={stats} />}
                    {activePage === 'users' && <UsersPage onSelectUser={setSelectedUserId} />}
                    {activePage === 'anonymous' && <AnonymousPage />}
                    {activePage === 'coupons' && <CouponsPage />}
                    {activePage === 'analytics' && <AnalyticsPage />}
                    {activePage === 'settings' && <SettingsPage />}
                </main>

                {/* User detail modal */}
                {selectedUserId && (
                    <UserDetailModal userId={selectedUserId} onClose={() => setSelectedUserId(null)} />
                )}
            </div>
        );
    }

    // ── Mount ────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById('admin-root')).render(<AdminApp />);
    </script>
</body>
</html>
