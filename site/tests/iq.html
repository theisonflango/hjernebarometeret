/* ═══════════ SHAPE ENGINE (SVG) ═══════════ */
const SHAPES=["circle","square","triangle","diamond","hexagon","star"];
function shapeEl(type,cx,cy,r,fill,color,rot,key){
  const stroke=color,sw=Math.max(2.4,r*0.13);
  const fillCol=fill==="solid"?color:(fill==="half"?color:"none");
  const fillOp=fill==="half"?0.32:(fill==="solid"?1:0);
  const common={key,fill:fillCol,fillOpacity:fillOp,stroke,strokeWidth:sw,strokeLinejoin:"round"};
  const tr=rot?`rotate(${rot} ${cx} ${cy})`:undefined;
  if(type==="circle")return<circle cx={cx} cy={cy} r={r} {...common} transform={tr}/>;
  if(type==="square"){const s=r*1.6;return<rect x={cx-s/2} y={cy-s/2} width={s} height={s} rx={r*0.14} {...common} transform={tr}/>;}
  if(type==="triangle"){const p=[[cx,cy-r],[cx+r*0.92,cy+r*0.75],[cx-r*0.92,cy+r*0.75]];return<polygon points={p.map(a=>a.join(",")).join(" ")} {...common} transform={tr}/>;}
  if(type==="diamond"){const p=[[cx,cy-r],[cx+r*0.82,cy],[cx,cy+r],[cx-r*0.82,cy]];return<polygon points={p.map(a=>a.join(",")).join(" ")} {...common} transform={tr}/>;}
  if(type==="hexagon"){const p=[];for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);p.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}return<polygon points={p.map(a=>a.join(",")).join(" ")} {...common} transform={tr}/>;}
  if(type==="star"){const p=[];for(let i=0;i<10;i++){const rr=i%2?r*0.45:r;const a=Math.PI/180*(36*i-90);p.push([cx+rr*Math.cos(a),cy+rr*Math.sin(a)]);}return<polygon points={p.map(a=>a.join(",")).join(" ")} {...common} transform={tr}/>;}
  return null;
}
// arrange n copies of a glyph inside a 100x100 cell
function arrange(n){
  if(n<=1)return[[50,50,27]];
  if(n===2)return[[31,50,20],[69,50,20]];
  if(n===3)return[[50,30,18],[31,68,18],[69,68,18]];
  return[[33,33,17],[67,33,17],[33,67,17],[67,67,17]];
}
// A "glyph cell": n copies of a shape with fill/rotation
function GlyphCell({cell,size=100,pad=6}){
  const{shape,n,fill,rot,color}=cell;
  const cells=arrange(n||1);
  const sc=size/100;
  return(<svg viewBox="0 0 100 100" width={size} height={size} style={{display:"block"}} aria-hidden="true">
    {cells.map((p,i)=>shapeEl(shape,p[0],p[1],p[2],fill||"none",color||C.ink,rot||0,i))}
  </svg>);
}
function cellKey(c){return[c.shape,c.n,c.fill,((c.rot||0)%360+360)%360].join("|");}
// Rotational symmetry per shape (degrees at which it looks identical). Circle=1 → rotation never visible.
const SYM={circle:1,square:90,triangle:120,diamond:180,hexagon:60,star:72};
// VISUAL key: two cells with the same visualKey render identically (rotation folded by symmetry).
function visualKey(c){const sym=SYM[c.shape]||360;const vr=sym<=1?0:(((c.rot||0)%sym)+sym)%sym;return[c.shape,c.n,c.fill,vr].join("|");}
function cellsEqual(a,b){return visualKey(a)===visualKey(b);}
// Shapes whose 90° / 45° rotation is actually visible (exclude circle + square).
const ROTATABLE=["triangle","diamond","hexagon","star"];

/* ═══════════ POLYOMINO ENGINE (mental rotation) ═══════════ */
function normalize(cells){
  const minc=Math.min(...cells.map(c=>c[0])),minr=Math.min(...cells.map(c=>c[1]));
  return cells.map(([c,r])=>[c-minc,r-minr]).sort((a,b)=>a[1]-b[1]||a[0]-b[0]);
}
function rot90(cells){return normalize(cells.map(([c,r])=>[-r,c]));}
function mirror(cells){return normalize(cells.map(([c,r])=>[-c,r]));}
function polyKey(cells){return normalize(cells).map(c=>c.join(",")).join(";");}
function rotationSet(cells){const s=new Set();let cur=normalize(cells);for(let i=0;i<4;i++){s.add(polyKey(cur));cur=rot90(cur);}return s;}
function isRotationOf(a,b){return rotationSet(a).has(polyKey(b));}
function PolyCell({cells,size=104,color=C.ink,fill=true}){
  const norm=normalize(cells);
  const maxc=Math.max(...norm.map(c=>c[0])),maxr=Math.max(...norm.map(c=>c[1]));
  const span=Math.max(maxc,maxr)+1;const u=size/(span+0.6);const off=(size-(span)*u)/2;
  return(<svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{display:"block"}} aria-hidden="true">
    {norm.map(([c,r],i)=><rect key={i} x={off+c*u+2} y={off+r*u+2} width={u-4} height={u-4} rx={u*0.14}
      fill={fill?color:"none"} fillOpacity={fill?0.16:0} stroke={color} strokeWidth="2.6" strokeLinejoin="round"/>)}
  </svg>);
}

/* ═══════════ ITEM GENERATORS ═══════════ */
const rInt=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
function sample(arr,k){const c=[...arr];const o=[];for(let i=0;i<k&&c.length;i++)o.push(c.splice(Math.floor(Math.random()*c.length),1)[0]);return o;}
function shuffleWithAnswer(options,correct){
  const arr=[...options];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return{options:arr,correctIndex:arr.indexOf(correct)};
}

/* MATRIX (3×3): two attributes vary systematically; bottom-right derived */
function genMatrix(diff){
  const fills=["none","half","solid"];
  const cols=sample(SHAPES,3),rowShapes=sample(SHAPES,3);
  const templates=["countCol_shapeRow","shapeCol_fillRow","rotCol_shapeRow","countCol_fillRow_hard"];
  const tmpl=diff<=2?pick(["countCol_shapeRow","shapeCol_fillRow"]):pick(templates);
  // rotation-rule rows only use shapes where rotation is visible
  const rotRowShapes=sample(ROTATABLE,3);
  const grid=[];let answer=null;
  for(let r=0;r<3;r++){grid[r]=[];for(let c=0;c<3;c++){
    let cell;
    if(tmpl==="countCol_shapeRow")cell={shape:rowShapes[r],n:c+1,fill:"solid",rot:0,color:C.ink};
    else if(tmpl==="shapeCol_fillRow")cell={shape:cols[c],n:1,fill:fills[r],rot:0,color:C.ink};
    else if(tmpl==="rotCol_shapeRow")cell={shape:rotRowShapes[r],n:1,fill:"none",rot:c*90,color:C.ink};
    else cell={shape:rowShapes[r],n:c+1,fill:fills[(r+c)%3],rot:0,color:C.ink};
    grid[r][c]=cell;if(r===2&&c===2)answer=cell;
  }}
  // distractors: perturb one attribute + tempting neighbours. VISUAL de-dup so no two options look identical.
  const distr=new Set([visualKey(answer)]);const opts=[answer];
  const cands=[
    {...answer,n:Math.max(1,(answer.n||1)===1?2:(answer.n||1)-1)},
    {...answer,shape:pick(SHAPES.filter(s=>s!==answer.shape))},
    {...answer,fill:pick(fills.filter(f=>f!==answer.fill))},
    {...answer,shape:pick(ROTATABLE.filter(s=>s!==answer.shape)),rot:(answer.rot||0)+45},
    grid[2][1],grid[1][2],grid[1][1],{...answer,n:(answer.n||1)===4?3:(answer.n||1)+1}
  ];
  for(const cd of cands){if(opts.length>=6)break;if(!distr.has(visualKey(cd))){distr.add(visualKey(cd));opts.push(cd);}}
  while(opts.length<6){const cd={shape:pick(SHAPES),n:rInt(1,4),fill:pick(fills),rot:pick([0,45,90]),color:C.ink};if(!distr.has(visualKey(cd))){distr.add(visualKey(cd));opts.push(cd);}}
  const{options,correctIndex}=shuffleWithAnswer(opts,answer);
  return{type:"matrix",grid,options:options.map(o=>({kind:"glyph",cell:o})),correctIndex,nOpt:options.length};
}

/* SERIES (1×4 → next): single glyph transformed each step */
function genSeries(diff){
  const transform=diff<=2?pick(["count","rot"]):pick(["count","rot","fill_rot"]);
  // rotation transforms use a rotatable shape + 45° step (visible for every position)
  const rotShape=pick(ROTATABLE);
  const shape=transform==="count"?pick(SHAPES):rotShape;
  const fills=["none","half","solid"];
  const rotStep=45;
  const seq=[];let answer;
  if(transform==="count"){for(let i=0;i<4;i++)seq.push({shape,n:i+1,fill:"solid",rot:0,color:C.ink});answer={shape,n:5,fill:"solid",rot:0,color:C.ink};}
  else if(transform==="rot"){for(let i=0;i<4;i++)seq.push({shape,n:1,fill:"none",rot:i*rotStep,color:C.ink});answer={shape,n:1,fill:"none",rot:4*rotStep,color:C.ink};}
  else{for(let i=0;i<4;i++)seq.push({shape,n:1,fill:fills[i%3],rot:i*rotStep,color:C.ink});answer={shape,n:1,fill:fills[4%3],rot:4*rotStep,color:C.ink};}
  const distr=new Set([visualKey(answer)]);const opts=[answer];
  const cands=[
    {...answer,n:(answer.n||1)===1?2:(answer.n||1)-1},
    {...answer,rot:(answer.rot||0)+rotStep},
    {...answer,fill:pick(fills.filter(f=>f!==answer.fill))},
    {...answer,shape:pick(SHAPES.filter(s=>s!==answer.shape))},
    seq[3],seq[2]
  ];
  for(const cd of cands){if(opts.length>=6)break;if(!distr.has(visualKey(cd))){distr.add(visualKey(cd));opts.push(cd);}}
  while(opts.length<6){const cd={shape:pick(SHAPES),n:rInt(1,5),fill:pick(fills),rot:pick([0,45,90]),color:C.ink};if(!distr.has(visualKey(cd))){distr.add(visualKey(cd));opts.push(cd);}}
  const{options,correctIndex}=shuffleWithAnswer(opts,answer);
  return{type:"series",seq,options:options.map(o=>({kind:"glyph",cell:o})),correctIndex,nOpt:options.length};
}

/* MENTAL ROTATION: chiral polyomino; one option is a pure rotation, rest mirrored/other */
const PENTOS=[
  [[1,0],[2,0],[0,1],[1,1],[1,2]], // F (chiral)
  [[0,0],[0,1],[0,2],[1,2],[2,2]], // V-ish -> actually L; use asymmetric
  [[0,0],[1,0],[1,1],[1,2],[2,2]], // Z/S (chiral)
  [[0,0],[0,1],[1,1],[2,1],[2,0]]  // U-ish
];
function genRotation(diff){
  // choose a chiral base (F or S) so mirror != rotation
  const base=pick([PENTOS[0],PENTOS[2]]);
  const k=rInt(1,3);let correct=base;for(let i=0;i<k;i++)correct=rot90(correct);
  const opts=[{cells:correct,correct:true}];
  const usedRot=new Set([...rotationSet(base)]); // any rotation of base counts as "same figure" -> must appear only once
  // distractor 1 & 2: mirror of base at various rotations (NOT a rotation of base since chiral)
  let mir=mirror(base);const mset=new Set();
  for(let i=0;i<4 && opts.length<3;i++){const key=polyKey(mir);if(!mset.has(key)){mset.add(key);opts.push({cells:mir,correct:false});}mir=rot90(mir);}
  // distractor 3: a different polyomino not rotation-equal to base
  let other=pick(PENTOS.filter(p=>polyKey(p)!==polyKey(base)));
  for(let g=0;g<8 && isRotationOf(base,other);g++)other=pick(PENTOS);
  const orot=rInt(0,3);let od=other;for(let i=0;i<orot;i++)od=rot90(od);
  opts.push({cells:od,correct:false});
  // ensure exactly one is a rotation of base
  const filtered=opts.filter((o,idx)=>idx===0 || !isRotationOf(base,o.cells));
  while(filtered.length<4){let x=mirror(base);for(let i=0;i<rInt(0,3);i++)x=rot90(x);if(!isRotationOf(base,x)&&!filtered.some(o=>polyKey(o.cells)===polyKey(x)))filtered.push({cells:x,correct:false});else{let y=pick(PENTOS);for(let i=0;i<rInt(0,3);i++)y=rot90(y);if(!isRotationOf(base,y)&&!filtered.some(o=>polyKey(o.cells)===polyKey(y)))filtered.push({cells:y,correct:false});}}
  const four=filtered.slice(0,4);
  const correctObj=four.find(o=>o.correct)||four[0];
  const sh=[...four];for(let i=sh.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[sh[i],sh[j]]=[sh[j],sh[i]];}
  return{type:"rotation",target:base,options:sh.map(o=>({kind:"poly",cells:o.cells})),correctIndex:sh.indexOf(correctObj),nOpt:sh.length};
}

/* Build the full 28-item test: rising difficulty, mixed types */
function buildItems(){
  const plan=[
    ["matrix",1],["series",1],["matrix",1],["rotation",1],["series",2],["matrix",2],
    ["rotation",2],["matrix",2],["series",2],["matrix",3],["rotation",2],["series",3],
    ["matrix",3],["rotation",3],["matrix",3],["series",3],["rotation",3],["matrix",4],
    ["series",4],["rotation",3],["matrix",4],["rotation",4],["series",4],["matrix",4],
    ["rotation",4],["series",4],["matrix",5],["rotation",4]
  ];
  return plan.map(([type,d],i)=>{
    let it;if(type==="matrix")it=genMatrix(d);else if(type==="series")it=genSeries(d);else it=genRotation(d);
    it.id=i+1;it.difficulty=d;return it;
  });
}

/* ═══════════ SCORING (honest, documented) ═══════════ */
const erf=x=>{const a1=.254829592,a2=-.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=.3275911,s=x>=0?1:-1;x=Math.abs(x);const tt=1/(1+p*x);return s*(1-(((((a5*tt+a4)*tt)+a3)*tt+a2)*tt+a1)*tt*Math.exp(-x*x));};
const normCDF=z=>0.5*(1+erf(z/Math.SQRT2));
function scoreTest(items,ans,timeSec){
  let correct=0;const guessSum=items.reduce((s,it)=>s+1/it.nOpt,0);
  const typeAgg={matrix:{c:0,t:0},series:{c:0,t:0},rotation:{c:0,t:0}};
  items.forEach((it,i)=>{typeAgg[it.type].t++;if(ans[i]===it.correctIndex){correct++;typeAgg[it.type].c++;}});
  const N=items.length;const guess=guessSum/N; // expected chance proportion (~0.18)
  const p=correct/N;
  // guessing-corrected proportion
  const pAdj=Math.max(0,Math.min(1,(p-guess)/(1-guess)));
  // provisional ability: logit of pAdj scaled to z (documented, NOT a normed claim)
  let z;if(pAdj<=0.02)z=-2.3;else if(pAdj>=0.98)z=2.3;else z=Math.log(pAdj/(1-pAdj))/1.55;
  const iq=Math.max(60,Math.min(145,Math.round(100+15*z)));
  const iqLow=Math.max(55,iq-10),iqHigh=Math.min(150,iq+10);
  const pct=Math.round(Math.max(1,Math.min(99,normCDF(z)*100)));
  const typeScores={};Object.keys(typeAgg).forEach(k=>typeScores[k]=typeAgg[k].t?Math.round(typeAgg[k].c/typeAgg[k].t*100):0);
  let cls;if(iq>=130)cls="superior";else if(iq>=120)cls="high";else if(iq>=110)cls="aboveAvg";else if(iq>=90)cls="average";else if(iq>=80)cls="belowAvg";else cls="low";
  return{iq,iqLow,iqHigh,pct,cls,typeScores,cp:typeScores,correct,total:N,time:timeSec,test_version:TEST_VERSION};
}
const clsCol={superior:C.green,high:C.blue,aboveAvg:C.accent,average:C.yellow,belowAvg:"#d97706",low:C.red};

function getAgeFromBirthYear(by){const now=new Date();return now.getFullYear()-by-(now.getMonth()<6?1:0);}

const Bell=({iq,low,high})=>{const pts=[];for(let x=55;x<=150;x++){const z=(x-100)/15;pts.push({x,y:Math.exp(-.5*z*z)});}const my=Math.max(...pts.map(p=>p.y));const W=420,H=140,P=28;const s=(x,y)=>({sx:P+(x-55)/95*(W-2*P),sy:H-P-(y/my)*(H-2*P)});const d=pts.map((p,i)=>`${i?'L':'M'}${s(p.x,p.y).sx},${s(p.x,p.y).sy}`).join(' ');const ux=s(Math.max(55,Math.min(150,iq)),0);const uy=s(iq,(pts.find(p=>Math.round(p.x)===Math.round(iq))||{y:0}).y);const lx=s(Math.max(55,low),0).sx,hx=s(Math.min(150,high),0).sx;return(<svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:480}} role="img" aria-label={`Estimeret IQ ${iq}, interval ${low} til ${high}`}><defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={C.accent} stopOpacity=".15"/><stop offset="100%" stopColor={C.accent} stopOpacity=".02"/></linearGradient></defs><path d={d+`L${s(150,0).sx},${H-P}L${s(55,0).sx},${H-P}Z`} fill="url(#bg)"/><rect x={lx} y={P-4} width={Math.max(2,hx-lx)} height={H-P-(P-4)} fill={C.yellow} fillOpacity="0.10"/><path d={d} fill="none" stroke={C.accent} strokeWidth="2"/>{[70,85,100,115,130,145].map(v=>{const{sx}=s(v,0);return<g key={v}><line x1={sx} y1={H-P} x2={sx} y2={H-P+4} stroke={C.text4}/><text x={sx} y={H-P+14} fill={C.text3} fontSize="9" textAnchor="middle">{v}</text></g>})}<line x1={ux.sx} y1={H-P} x2={ux.sx} y2={uy.sy} stroke={C.yellow} strokeWidth="2" strokeDasharray="3,3"/><circle cx={ux.sx} cy={uy.sy} r="4.5" fill={C.yellow}/><text x={ux.sx} y={uy.sy-10} fill={C.yellow} fontSize="12" fontWeight="bold" textAnchor="middle">{iq}</text></svg>);};
const CatBar=({label,value,delay=0})=>{const[w,setW]=useState(0);useEffect(()=>{const t=setTimeout(()=>setW(value),delay);return()=>clearTimeout(t);},[value,delay]);const col=value>=80?C.green:value>=60?C.accent:value>=40?C.yellow:C.red;return(<div style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:13}}><span style={{color:C.text3}}>{label}</span><span style={{color:col,fontWeight:600}}>{value}%</span></div><div style={{background:C.border,borderRadius:6,height:6,overflow:"hidden"}}><div style={{width:`${w}%`,height:"100%",borderRadius:6,background:col,transition:"width 1s cubic-bezier(.22,1,.36,1)"}}/></div></div>);};

  /* ─── FREE RESULTS ─── */
  const Results=()=>{if(!res)return null;
    if(anim)return(<div style={{maxWidth:480,margin:"80px auto",textAlign:"center",padding:20}}><div style={{display:"flex",justifyContent:"center",marginBottom:18}}><PolyCell cells={PENTOS[0]} size={54} color={C.accent}/></div><h2 style={{fontFamily:C.serif,fontSize:22,fontWeight:600,marginBottom:14}}>{t.analyzing}…</h2><div style={{height:3,background:C.border,borderRadius:4,overflow:"hidden",maxWidth:280,margin:"0 auto"}}><div style={{width:"100%",height:"100%",background:`linear-gradient(90deg,transparent,${C.accent},transparent)`,backgroundSize:"200% 100%",animation:"shimmer 1.5s ease-in-out infinite"}}/></div></div>);
    const communityLine=()=>{
      if(community===undefined)return<div style={{fontSize:12,color:C.text4}}>{t.commWait}</div>;
      if(community===null)return<div style={{fontSize:12.5,color:C.text3,lineHeight:1.6}}>{t.commNone}</div>;
      return(<div><div style={{fontSize:13.5,color:C.text2,lineHeight:1.65}}>{t.commLine.replace("{p}",community.higher_pct).replace("{n}",community.n)}</div><div style={{marginTop:8,fontSize:12,color:C.text3}}>{t.commAvg}: <b style={{color:C.accent}}>{Math.round(community.mean)}</b></div></div>);
    };
    return(<div style={{maxWidth:600,margin:"0 auto",padding:"40px 20px"}}>
      <h2 style={{fontFamily:C.serif,fontSize:26,fontWeight:600,textAlign:"center",marginBottom:8}}>{t.resTitle}</h2>
      <p style={{textAlign:"center",color:C.text3,fontSize:13,marginBottom:28}}>{t.estExplain}</p>
      {/* ESTIMATE — the honest headline (shown free) */}
      <div className="card-glow" style={{padding:"32px 26px",marginBottom:18,textAlign:"center"}}>
        <div style={{fontSize:11,color:C.text4,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>{t.estLabel}</div>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"center",gap:10}}>
          <div style={{fontSize:64,fontWeight:700,color:C.accent,lineHeight:1,fontFamily:C.serif}}><ANum target={res.iq}/></div>
          <div style={{fontSize:15,color:C.text3,fontWeight:600}}>({res.iqLow}–{res.iqHigh})</div>
        </div>
        <div style={{fontSize:12,color:C.text4,marginTop:6}}>{t.estBand}</div>
        <div style={{display:"inline-block",padding:"5px 16px",borderRadius:40,background:`${clsCol[res.cls]}15`,border:`1px solid ${clsCol[res.cls]}30`,color:clsCol[res.cls],fontSize:12,fontWeight:700,marginTop:14}}>{t.cls[res.cls]}</div>
      </div>
      {/* COMMUNITY — empirical comparison */}
      <div className="card" style={{padding:"20px 22px",marginBottom:18}}>
        <div style={{fontSize:11,color:C.accent,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,marginBottom:8}}>{t.commTitle}</div>
        {communityLine()}
      </div>
      {/* BLURRED breakdown teaser */}
      <div style={{position:"relative",overflow:"hidden",borderRadius:14,marginBottom:22}}>
        <div style={{filter:"blur(7px)",opacity:.35,pointerEvents:"none",padding:22,background:C.card}}>{["","",""].map((_,i)=><div key={i} style={{marginBottom:10}}><div style={{background:C.border,borderRadius:4,height:6}}><div style={{width:`${45+i*18}%`,height:"100%",borderRadius:4,background:C.accent}}/></div></div>)}</div>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(250,249,247,.55)"}}><div style={{textAlign:"center"}}><div style={{fontSize:28,marginBottom:4}}>🔒</div><div style={{fontSize:13,color:C.accent,fontWeight:600}}>{t.typeTitle}</div></div></div>
      </div>
      {/* PAYWALL */}
      <div className="card" style={{padding:30,textAlign:"center",marginBottom:22,border:`1.5px solid ${C.accentBorder}`}}>
        <h3 style={{fontFamily:C.serif,fontSize:20,fontWeight:600,marginBottom:8}}>{t.unlockTitle}</h3>
        <p style={{color:C.text3,fontSize:12.5,marginBottom:16,maxWidth:400,marginLeft:"auto",marginRight:"auto",lineHeight:1.6}}>{t.unlockDesc}</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,maxWidth:380,margin:"0 auto 22px",textAlign:"left"}}>{t.unlockFeats.map((f,i)=><div key={i} style={{fontSize:12,color:C.text2,display:"flex",alignItems:"center",gap:6}}><span style={{color:C.green,flexShrink:0}}>✓</span>{f}</div>)}</div>
        <button className="btn-p" style={{width:"100%",maxWidth:380,padding:15,fontSize:15}} onClick={()=>buyReport('single')}>{t.unlockBtn}</button>
        <div style={{display:"flex",justifyContent:"center",gap:14,marginTop:12,fontSize:11,color:C.text4}}><span>{t.secure}</span><span>{t.instant}</span></div>
      </div>
      <div style={{textAlign:"center",margin:"18px 0"}}><button style={{background:"#1c1b1a",color:"#fff",padding:"12px 24px",borderRadius:10,fontSize:14,fontWeight:600,border:"none",cursor:"pointer"}} onClick={()=>{if(window.HB_CARD&&res)HB_CARD.share('iq',res)}}>{t.share}</button></div>
      <div id="hb-save-prompt-iq"></div>
      <div style={{display:"flex",gap:10,justifyContent:"center"}}><button className="btn-s" onClick={goTest}>{t.retake}</button><button className="btn-s" onClick={()=>go("home")}>← {t.home}</button></div>
    </div>);
  };

  /* ─── PAID REPORT ─── */
  const Paid=()=>{if(!res)return null;const cc=clsCol[res.cls]||C.text3;const ts=res.typeScores||res.cp||{};
    const tips=(()=>{const names={matrix:t.typeMatrix,series:t.typeSeries,rotation:t.typeRot};const tipTxt={matrix:lang==="en"?"Practice matrix and abstract pattern puzzles.":"Øv matrix- og mønsterpuslespil.",series:lang==="en"?"Train sequence and rule-finding tasks.":"Træn sekvens- og regelopgaver.",rotation:lang==="en"?"3D puzzles and Tetris build spatial skills.":"3D-puslespil og Tetris styrker rumlig evne."};const sorted=Object.entries(ts).sort((a,b)=>b[1]-a[1]);const out=[];if(sorted[0])out.push({type:"strength",cat:names[sorted[0][0]],tip:lang==="en"?`${names[sorted[0][0]]} is a clear strength.`:`${names[sorted[0][0]]} er en klar styrke.`});const last=sorted[sorted.length-1];if(last)out.push({type:"improve",cat:names[last[0]],tip:tipTxt[last[0]]});return out;})();
    return(<div style={{maxWidth:620,margin:"0 auto",padding:"40px 20px"}}>
      <h2 style={{fontFamily:C.serif,fontSize:26,fontWeight:600,textAlign:"center",marginBottom:28}}>{t.paidTitle}</h2>
      <div className="card-glow" style={{padding:34,textAlign:"center",marginBottom:18}}>
        <div style={{fontSize:11,color:C.text4,textTransform:"uppercase",letterSpacing:2,marginBottom:8}}>{t.estLabel}</div>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"center",gap:10}}><div style={{fontSize:70,fontWeight:700,lineHeight:1,color:C.accent,fontFamily:C.serif}}><ANum target={res.iq}/></div><div style={{fontSize:16,color:C.text3,fontWeight:600}}>({res.iqLow}–{res.iqHigh})</div></div>
        <div style={{display:"inline-block",padding:"5px 16px",borderRadius:40,background:`${cc}15`,border:`1px solid ${cc}30`,color:cc,fontSize:12,fontWeight:700,marginTop:12}}>{t.cls[res.cls]}</div>
        <div style={{marginTop:10,color:C.text3,fontSize:13}}>{t.pctDesc.replace("{p}",res.pct)}</div>
        {res.community&&<div style={{marginTop:4,color:C.text4,fontSize:12}}>{t.commAvg}: {Math.round(res.community.mean)} · {t.commLine.replace("{p}",res.community.higher_pct).replace("{n}",res.community.n)}</div>}
        <div style={{marginTop:22}}><div style={{fontSize:10,color:C.text4,textTransform:"uppercase",letterSpacing:1.5,marginBottom:8}}>{t.bell}</div><Bell iq={res.iq} low={res.iqLow} high={res.iqHigh}/></div>
      </div>
      <div className="card" style={{padding:26,marginBottom:18}}><h3 style={{fontFamily:C.serif,fontSize:17,fontWeight:600,marginBottom:18}}>{t.typeTitle}</h3>
        <CatBar label={t.typeMatrix} value={ts.matrix||0} delay={200}/><CatBar label={t.typeSeries} value={ts.series||0} delay={380}/><CatBar label={t.typeRot} value={ts.rotation||0} delay={560}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
        {[[t.estLabel,res.iq],[t.correct,`${res.correct}/${res.total}`],[t.time,fmt(res.time)]].map(([l,v],i)=><div key={i} className="card" style={{padding:16,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:C.accent}}>{v}</div><div style={{fontSize:10,color:C.text4,marginTop:3,textTransform:"uppercase",letterSpacing:1}}>{l}</div></div>)}
      </div>
      <div className="card" style={{padding:26,marginBottom:18}}><h3 style={{fontFamily:C.serif,fontSize:17,fontWeight:600,marginBottom:14}}>{t.tipTitle}</h3>
        {tips.map((tip,i)=><div key={i} style={{padding:"10px 14px",background:tip.type==="strength"?"#e8f0ec":"#fef9e7",border:`1px solid ${tip.type==="strength"?"#b8dbc8":"#e5d5a8"}`,borderRadius:10,marginBottom:8}}><div style={{fontSize:11,fontWeight:700,color:tip.type==="strength"?C.green:C.yellow,marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>{tip.type==="strength"?"★":"↑"} {tip.cat}</div><div style={{fontSize:12,color:C.text2,lineHeight:1.6}}>{tip.tip}</div></div>)}
      </div>
      <div className="card" style={{padding:"18px 22px",marginBottom:18,background:C.warm}}><div style={{fontSize:11,color:C.text3,textTransform:"uppercase",letterSpacing:1.2,fontWeight:700,marginBottom:6}}>{t.method}</div><div style={{fontSize:12.5,color:C.text3,lineHeight:1.7}}>{t.methodTxt}</div></div>
      <div style={{textAlign:"center",margin:"18px 0"}}><button style={{background:"#1c1b1a",color:"#fff",padding:"12px 24px",borderRadius:10,fontSize:14,fontWeight:600,border:"none",cursor:"pointer"}} onClick={()=>{if(window.HB_CARD&&res)HB_CARD.share('iq',res)}}>{t.share}</button></div>
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}><button className="btn-s" onClick={goTest}>{t.retake}</button><button className="btn-s" onClick={()=>go("home")}>← {t.home}</button></div>
    </div>);
  };

  return(<main>{page==="home"&&<Home/>}{page==="test"&&<Test/>}{page==="results"&&<Results/>}{page==="paid"&&<Paid/>}</main>);
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
