const{useState,useRef,useCallback,useEffect,useMemo}=React;

/* ═══════════════════════════════════════════════════════
   ASRS v1.1 — Adult ADHD Self-Report Scale
   WHO / Kessler et al. (2005)
   18 items, 5-point Likert
   Copyright © World Health Organization
   ═══════════════════════════════════════════════════════ */

const ASRS_ITEMS = [
  // Part A — Screening (6 items)
  { id:1,  part:"A", domain:"inattention",
    da:"Hvor ofte har du svært ved at afslutte de sidste detaljer i et projekt, når de udfordrende dele er overstået?",
    en:"How often do you have trouble wrapping up the final details of a project, once the challenging parts have been done?",
    threshold: 2 }, // "Sommetider" eller højere
  { id:2,  part:"A", domain:"inattention",
    da:"Hvor ofte har du svært ved at få tingene i orden, når du skal lave en opgave der kræver organisering?",
    en:"How often do you have difficulty getting things in order when you have to do a task that requires organization?",
    threshold: 2 },
  { id:3,  part:"A", domain:"inattention",
    da:"Hvor ofte har du problemer med at huske aftaler eller forpligtelser?",
    en:"How often do you have problems remembering appointments or obligations?",
    threshold: 2 },
  { id:4,  part:"A", domain:"inattention",
    da:"Når du har en opgave der kræver meget tankearbejde, hvor ofte undgår eller udskyder du at komme i gang?",

    threshold: 3 }, // "Ofte" eller højere
  { id:5,  part:"A", domain:"hyperactivity",
    da:"Hvor ofte sidder du og piller ved ting eller vipper med fødderne, når du skal sidde stille i længere tid?",
    en:"How often do you fidget or squirm with your hands or feet when you have to sit down for a long time?",
    threshold: 3 },
  { id:6,  part:"A", domain:"hyperactivity",
    da:"Hvor ofte føler du dig overdrevent aktiv og tvunget til at gøre ting, som om du var drevet af en motor?",
    en:"How often do you feel overly active and compelled to do things, like you were driven by a motor?",
    threshold: 3 },

  // Part B — Supplerende (12 items)
  { id:7,  part:"B", domain:"inattention",
    da:"Hvor ofte laver du skødesløse fejl, når du skal arbejde med et kedeligt eller svært projekt?",

  { id:10, part:"B", domain:"inattention",

  { id:13, part:"B", domain:"hyperactivity",
    da:"Hvor ofte føler du dig rastløs eller urolig?",
    en:"How often do you feel restless or fidgety?" },
  { id:14, part:"B", domain:"hyperactivity",
    da:"Hvor ofte har du svært ved at slappe af og falde til ro, når du har fri?",
    en:"How often do you have difficulty unwinding and relaxing when you have time to yourself?" },
  { id:15, part:"B", domain:"hyperactivity",
    da:"Hvor ofte oplever du at du taler for meget i sociale situationer?",
    en:"How often do you find yourself talking too much when you are in social situations?" },
  { id:16, part:"B", domain:"hyperactivity",
    da:"Når du er i en samtale, hvor ofte kommer du til at gøre andres sætninger færdige, før de selv når det?",
    en:"When you're in a conversation, how often do you find yourself finishing the sentences of the people you are talking to, before they can finish them themselves?" },
  { id:17, part:"B", domain:"hyperactivity",
    da:"Hvor ofte har du svært ved at vente på din tur i situationer, hvor det er nødvendigt?",

const LIKERT5 = [
  { value:0, da:"Aldrig",        en:"Never" },
  { value:1, da:"Sjældent",      en:"Rarely" },
  { value:2, da:"Sommetider",    en:"Sometimes" },
  { value:3, da:"Ofte",          en:"Often" },
  { value:4, da:"Meget ofte",    en:"Very Often" },
];

/* ═══════ HELPERS ═══════ */
function getAgeFromBirthYear(by) {
  const now = new Date();
  return now.getFullYear() - by - (now.getMonth() < 6 ? 1 : 0);
}
function getAgeGroup(age) {
  if (age < 16) return "13-15";
  if (age < 20) return "16-19";
  if (age < 25) return "20-24";
  if (age < 30) return "25-29";
  if (age < 35) return "30-34";
  if (age < 45) return "35-44";
  if (age < 55) return "45-54";
  if (age < 65) return "55-64";
  return "65+";
}

/* ═══════ SCORING ═══════ */
function calcASRS(answers) {
  const partA = ASRS_ITEMS.filter(q => q.part === "A");
  const partB = ASRS_ITEMS.filter(q => q.part === "B");

  // Part A screening: count items above threshold
  let partAAbove = 0;
  partA.forEach(q => {
    if ((answers[q.id] ?? 0) >= q.threshold) partAAbove++;
  });

  // Domain scores
  const inattItems = ASRS_ITEMS.filter(q => q.domain === "inattention");
  const hyperItems = ASRS_ITEMS.filter(q => q.domain === "hyperactivity");
  const inattSum = inattItems.reduce((s,q) => s + (answers[q.id] ?? 0), 0);
  const hyperSum = hyperItems.reduce((s,q) => s + (answers[q.id] ?? 0), 0);
  const inattMax = inattItems.length * 4;
  const hyperMax = hyperItems.length * 4;
  const inattPct = Math.round((inattSum / inattMax) * 100);
  const hyperPct = Math.round((hyperSum / hyperMax) * 100);
  const totalSum = inattSum + hyperSum;
  const totalMax = inattMax + hyperMax;
  const totalPct = Math.round((totalSum / totalMax) * 100);

  // Level based on Part A
  let level, label, color;
  if (partAAbove >= 4) {
    level = "high"; label = "Høj sandsynlighed"; color = "#C0392B";
  } else if (partAAbove >= 2) {
    level = "moderate"; label = "Moderat sandsynlighed"; color = "#D4920B";
  } else {
    level = "low"; label = "Lav sandsynlighed"; color = "#3B9979";
  }

  // Profile type
  let profileType;
  if (inattPct > hyperPct + 15) profileType = "overvejende uopmærksom";
  else if (hyperPct > inattPct + 15) profileType = "overvejende hyperaktiv/impulsiv";
  else profileType = "kombineret";

  return {
    mode: "asrs",
    partAScore: partAAbove,
    partATotal: 6,
    partAAboveThreshold: partAAbove >= 4,
    inattPct, hyperPct, totalPct,
    inattSum, hyperSum, totalSum,
    inattMax, hyperMax, totalMax,
    level, label, color, profileType,
  };
}

/* ═══════ COMPONENTS ═══════ */

    React.createElement('p', { style: { fontSize:'0.78rem', color:'var(--text-3)', marginBottom:10, lineHeight:1.5 } }, 'Bruges til at sammenligne din score med andre i din aldersgruppe'),
    React.createElement('select', {
      value, onChange: e => onChange(e.target.value),
      style: { width:'100%', padding:'12px 16px', fontSize:'0.95rem', border:'1px solid var(--border)', borderRadius:8, background:'var(--bg-card)', color:'var(--text)', fontFamily:'inherit', appearance:'auto', cursor:'pointer' }
    },
      React.createElement('option', { value:'' }, 'Vælg fødselsår...'),
      years.map(y => React.createElement('option', { key:y, value:y }, y))
    )
  );
}

function UnderAgeWarning({ age, onContinue }) {

function Intro({ onStart }) {

    React.createElement('div', { style: S.intro },
      React.createElement('div', { style: S.badge }, 'ADHD-screening'),
      React.createElement('h1', { style: S.h1 },
        'Har du ', React.createElement('em', { style: { fontStyle:'italic', color:'var(--accent)' } }, 'ADHD'), '-træk?'
      ),

            React.createElement('h4', { style: { fontSize:'0.82rem', fontWeight:600, marginBottom:3 } }, 'Uopmærksomhed'),

        React.createElement('kbd', { style: { background:'var(--bg-card)', border:'1px solid var(--border)', padding:'2px 6px', borderRadius:4, fontFamily:'monospace', fontSize:'0.68rem' } }, 'Enter'),
        ' næste · ',
        React.createElement('kbd', { style: { background:'var(--bg-card)', border:'1px solid var(--border)', padding:'2px 6px', borderRadius:4, fontFamily:'monospace', fontSize:'0.68rem' } }, '←'),
        ' tilbage'
      )
    )
  );
}

function Calculating({ onDone }) {
  const [step, setStep] = useState(0);
  useEffect(() => {
    const steps = [400, 800, 1200, 1600];
    const timers = steps.map((ms, i) => setTimeout(() => setStep(i + 1), ms));
    const done = setTimeout(onDone, 2000);
    return () => { timers.forEach(clearTimeout); clearTimeout(done); };
  }, []);
  const labels = ["Scorer Part A (screening)", "Analyserer symptomprofil", "Beregner domæne-scores", "Genererer din profil"];
  return React.createElement('div', { style: { ...S.container, padding:'120px 0', textAlign:'center' } },
    React.createElement('div', { style: { width:48, height:48, border:'3px solid var(--border)', borderTopColor:'var(--accent)', borderRadius:'50%', animation:'spin 0.8s linear infinite', margin:'0 auto 24px' } }),
    React.createElement('p', { style: { color:'var(--text-2)' } }, 'Analyserer dine svar...'),
    React.createElement('div', { style: { maxWidth:260, margin:'24px auto 0', textAlign:'left' } },
      labels.map((l, i) =>
        React.createElement('div', { key:i, style: { display:'flex', alignItems:'center', gap:10, padding:'6px 0', fontSize:'0.82rem', color: i < step ? 'var(--green)' : i === step ? 'var(--accent)' : 'var(--text-3)', transition:'color 0.3s' } },
          React.createElement('div', { style: { width:7, height:7, borderRadius:'50%', flexShrink:0, background: i < step ? 'var(--green)' : i === step ? 'var(--accent)' : 'var(--text-3)', transition:'background 0.3s' } }),
          l
        )
      )
    )
  );
}

function DomainBar({ label, pct, color }) {
  return React.createElement('div', { style: { marginBottom:16 } },
    React.createElement('div', { style: { display:'flex', justifyContent:'space-between', marginBottom:6 } },
      React.createElement('span', { style: { fontSize:'0.85rem', fontWeight:500 } }, label),
      React.createElement('span', { style: { fontSize:'0.85rem', fontWeight:600, color } }, `${pct}%`)
    ),
    React.createElement('div', { style: { height:8, background:'var(--border)', borderRadius:4, overflow:'hidden' } },
      React.createElement('div', { style: { height:'100%', width:`${pct}%`, background:color, borderRadius:4, transition:'width 0.8s ease-out' } })
    )
  );
}

function Results({ profile, birthYear, answers }) {
  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'smooth' });

        birth_year: birthYear,
        age,
        age_group: getAgeGroup(age),

          id: q.id, part: q.part, domain: q.domain, text: q.da, chosen: answers[q.id] ?? null
        }))

        style: { display:'inline-block', padding:'5px 16px', borderRadius:20, fontSize:'0.72rem', fontWeight:600, textTransform:'uppercase', letterSpacing:'1.5px', marginBottom:14, color:'#fff', background:profile.color }
      }, profile.label),

      React.createElement('p', { style: { color:'var(--text-2)', fontSize:'0.9rem', maxWidth:500, margin:'0 auto', lineHeight:1.65 } },

        React.createElement('span', { style: { fontFamily:'var(--serif)', fontSize:'2.2rem', fontWeight:700, lineHeight:1, color:profile.color } }, profile.partAScore),

      React.createElement('p', { style: { fontSize:'0.85rem', color:'var(--text-2)', lineHeight:1.6, maxWidth:420, margin:'0 auto' } },
        profile.partAAboveThreshold
          ? `${profile.partAScore} af 6 screening-spørgsmål ligger i det klinisk signifikante område. Score ≥ 4 er konsistent med ADHD og anbefaler videre udredning.`
          : `${profile.partAScore} af 6 screening-spørgsmål ligger i det klinisk signifikante område. Score under 4 tyder på lavere sandsynlighed for ADHD.`
      )
    ),

    // Domain bars
    React.createElement('div', { style: { ...S.cardLg, marginBottom:24 } },
      React.createElement('h3', { style: { fontFamily:'var(--serif)', fontSize:'1.1rem', fontWeight:600, marginBottom:6, textAlign:'center' } }, 'Symptomprofil'),
      React.createElement('p', { style: { fontSize:'0.78rem', color:'var(--text-3)', marginBottom:20, textAlign:'center' } }, 'Baseret på alle 18 ASRS-spørgsmål'),
      React.createElement(DomainBar, { label:'Uopmærksomhed', pct:profile.inattPct, color:'#2e6b9e' }),
      React.createElement(DomainBar, { label:'Hyperaktivitet / Impulsivitet', pct:profile.hyperPct, color:'#e8873c' }),
      React.createElement('div', { style: { marginTop:20, padding:'12px 16px', background:'var(--accent-glow)', borderRadius:8, fontSize:'0.82rem', color:'var(--text-2)', textAlign:'center' } },
        'Profil: ', React.createElement('strong', null,
          profile.profileType === 'overvejende uopmærksom' ? 'Overvejende uopmærksom' :
          profile.profileType === 'overvejende hyperaktiv/impulsiv' ? 'Overvejende hyperaktiv/impulsiv' :
          'Kombineret (uopmærksom + hyperaktiv)'
        )
      )
    ),

    // Per-item breakdown
    React.createElement('div', { style: { ...S.cardLg, marginBottom:24 } },
      React.createElement('h3', { style: { fontFamily:'var(--serif)', fontSize:'1.1rem', fontWeight:600, marginBottom:16, textAlign:'center' } }, 'Dine svar'),
      ASRS_ITEMS.map((q, i) => {
        const val = answers[q.id] ?? 0;
        const isPartA = q.part === "A";
        const aboveThreshold = isPartA && val >= q.threshold;
        return React.createElement('div', { key: q.id, style: { padding:'10px 0', borderBottom: i < 17 ? '1px solid var(--border)' : 'none', display:'flex', gap:12, alignItems:'flex-start' } },
          React.createElement('span', { style: { fontSize:'0.72rem', color:'var(--text-3)', fontWeight:600, minWidth:24, paddingTop:2 } }, `${q.id}.`),
          React.createElement('div', { style: { flex:1 } },
            React.createElement('p', { style: { fontSize:'0.82rem', color:'var(--text)', lineHeight:1.5, marginBottom:4 } }, q.da),
            React.createElement('span', { style: { fontSize:'0.75rem', fontWeight:500, color: aboveThreshold ? '#C0392B' : val >= 2 ? '#D4920B' : 'var(--green)' } }, LIKERT5[val].da)
          ),
          isPartA && aboveThreshold && React.createElement('span', { style: { fontSize:'0.65rem', background:'#fde8e8', color:'#C0392B', padding:'2px 8px', borderRadius:10, fontWeight:600, whiteSpace:'nowrap', marginTop:2 } }, '⚠ Over cutoff')
        );
      })
    ),

    // Recommendation
    profile.level !== 'low' && React.createElement('div', { style: { ...S.cardLg, marginBottom:24, borderColor: profile.level === 'high' ? '#C0392B' : '#D4920B', borderWidth:2 } },
      React.createElement('h3', { style: { fontFamily:'var(--serif)', fontSize:'1.1rem', fontWeight:600, marginBottom:10 } }, '📋 Anbefaling'),
      React.createElement('p', { style: { fontSize:'0.88rem', color:'var(--text-2)', lineHeight:1.7, marginBottom:16 } },
        profile.level === 'high'
          ? 'Din screening viser et mønster der er konsistent med ADHD. Vi anbefaler at du tager kontakt til din egen læge med henblik på en formel udredning. Tag evt. denne screenings resultater med til samtalen.'
          : 'Din screening viser nogle træk der kan pege i retning af ADHD. Det kan være relevant at tale med din læge, især hvis symptomerne påvirker din hverdag.'
      ),
      React.createElement('div', { style: { padding:'14px 16px', background:'var(--bg-warm)', borderRadius:8, fontSize:'0.82rem', color:'var(--text-2)', lineHeight:1.6 } },
        React.createElement('strong', null, '💡 Vidste du? '),

      }, '📤 Del dit profilkort'),
      React.createElement('button', {
        onClick: () => { if (window.HB_CARD) HB_CARD.download('adhd', profile); },
        style: { ...S.btnSm('transparent', 'var(--accent)'), marginLeft:12, borderColor:'var(--accent)' }
      }, '📥 Download')
    ),

    // Save prompt for anonymous users
    React.createElement('div', { id: 'hb-save-prompt-adhd' }),

    // Cross-sell
    React.createElement('div', { style: { ...S.cardLg, textAlign:'center', marginBottom:24 } },
      React.createElement('h3', { style: { fontFamily:'var(--serif)', fontSize:'1rem', fontWeight:600, marginBottom:8 } }, 'Andre tests du måske er interesseret i'),
      React.createElement('div', { style: { display:'flex', gap:12, justifyContent:'center', flexWrap:'wrap', marginTop:16 } },
        [
          { name:'Stress & Udbrændthed', url:'stress.html', color:'#c2553a' },
          { name:'Autisme (AQ-50)', url:'autisme.html', color:'#3a7d5e' },
          { name:'Personlighed', url:'personlighed.html', color:'#b8860b' },
        ].map(t =>
          React.createElement('a', { key:t.name, href:t.url, style: { padding:'8px 18px', borderRadius:20, border:`1px solid ${t.color}`, color:t.color, fontSize:'0.82rem', fontWeight:500, textDecoration:'none', transition:'all 0.2s' } }, t.name)
        )
      )
    ),

    // Disclaimer
    React.createElement('div', { style: { ...S.card, marginBottom:24 } },
      React.createElement('p', { style: { fontSize:'0.75rem', color:'var(--text-3)', lineHeight:1.7 } },
        React.createElement('strong', null, 'Disclaimer: '),
        'Denne ADHD-screening er baseret på WHO\'s Adult ADHD Self-Report Scale (ASRS v1.1) og er udelukkende beregnet til selvvurdering og oplysning. Den erstatter ikke en professionel klinisk vurdering, diagnose eller behandling. Konsultér altid en kvalificeret sundhedsprofessionel for diagnostik og behandling af ADHD.'
      ),
      React.createElement('p', { style: { fontSize:'0.68rem', color:'var(--text-4)', marginTop:10 } },
        'Kessler, R.C., Adler, L., Ames, M., Demler, O., Faraone, S., Hiripi, E., ... & Walters, E. E. (2005). The World Health Organization Adult ADHD Self-Report Scale (ASRS): a short screening scale for use in the general population. Psychological Medicine, 35(2), 245-256. Copyright © World Health Organization.'
      )
    )
  );
}

/* ═══════ APP ═══════ */
function App() {
  const [phase, setPhase] = useState("intro"); // intro, test, calculating, results
  const [birthYear, setBirthYear] = useState(null);
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState({});
  const [profile, setProfile] = useState(null);

  const handleStart = (by) => {
    setBirthYear(by);
    setPhase("test");
    window.scrollTo({ top: 0 });
  };

  const handleSelect = (val) => {
    setAnswers(prev => ({ ...prev, [ASRS_ITEMS[currentQ].id]: val }));
  };

  const handleNext = () => {
    if (currentQ < ASRS_ITEMS.length - 1) {
      setCurrentQ(currentQ + 1);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      setPhase("calculating");
    }
  };

  const handlePrev = () => {
    if (currentQ > 0) {
      setCurrentQ(currentQ - 1);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  // Keyboard nav
  useEffect(() => {
    if (phase !== "test") return;
    const handler = (e) => {
      const num = parseInt(e.key);
      if (num >= 1 && num <= 5) {
        handleSelect(num - 1);
      } else if (e.key === "Enter" && answers[ASRS_ITEMS[currentQ].id] !== undefined) {
        handleNext();
      } else if (e.key === "ArrowLeft") {
        handlePrev();
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [phase, currentQ, answers]);

  if (phase === "intro") return React.createElement(Intro, { onStart: handleStart });
  if (phase === "test") return React.createElement(Question, {
    item: ASRS_ITEMS[currentQ],
    value: answers[ASRS_ITEMS[currentQ].id],
    onSelect: handleSelect,
    index: currentQ,
    total: ASRS_ITEMS.length,
    onPrev: handlePrev,
    onNext: handleNext,
    canNext: answers[ASRS_ITEMS[currentQ].id] !== undefined
  });
  if (phase === "calculating") return React.createElement(Calculating, {
    onDone: () => {
      setProfile(calcASRS(answers));
      setPhase("results");
    }
  });
  if (phase === "results") return React.createElement(Results, { profile, birthYear, answers });
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
