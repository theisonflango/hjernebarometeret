const erf=x=>{const a1=.254829592,a2=-.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=.3275911,s=x>=0?1:-1;x=Math.abs(x);const tt=1/(1+p*x);return s*(1-(((((a5*tt+a4)*tt)+a3)*tt+a2)*tt+a1)*tt*Math.exp(-x*x));};
const calcIQ=(ans,qs,time)=>{const cats={};["pattern","logic","spatial","memory","verbal","numerical"].forEach(c=>cats[c]={cor:0,tot:0});let ws=0,tw=0;qs.forEach((q,i)=>{cats[q.cat].tot++;tw+=q.d;if(ans[i]===q.c){cats[q.cat].cor++;ws+=q.d;}});const tb=Math.max(0,Math.min(.05,(qs.length*45-time)/(qs.length*45)*.1)),wa=ws/tw,z=(wa+tb-.5)*4;const iq=Math.max(55,Math.min(160,Math.round(100+z*15)));const pct=Math.round(Math.min(99.9,Math.max(.1,50*(1+erf(z/1.414))))*10)/10;const cp={};Object.keys(cats).forEach(c=>cp[c]=cats[c].tot>0?Math.round(cats[c].cor/cats[c].tot*100):0);const cor=Object.values(cats).reduce((s,c)=>s+c.cor,0);let cls;if(iq>=130)cls="very-superior";else if(iq>=120)cls="superior";else if(iq>=110)cls="high-average";else if(iq>=90)cls="average";else if(iq>=80)cls="low-average";else if(iq>=70)cls="borderline";else cls="extremely-low";return{iq,pct,cls,cp,cor,tot:qs.length,time};};
const getTips=(cp,lang)=>{const e=lang==="en";const tips=[];const n=e?{pattern:"Pattern Recognition",logic:"Logical Reasoning",spatial:"Spatial Ability",memory:"Working Memory",verbal:"Verbal Reasoning",numerical:"Numerical Reasoning"}:{pattern:"Mønstergenkendelse",logic:"Logisk Ræsonnement",spatial:"Rumlig Evne",memory:"Arbejdshukommelse",verbal:"Verbal Ræsonnement",numerical:"Numerisk Ræsonnement"};const tm=e?{pattern:"Practice matrix puzzles and visual sequences.",logic:"Try Sudoku and syllogism exercises.",spatial:"3D puzzles and Tetris boost spatial skills.",memory:"Memory games and number sequences help.",verbal:"Read widely and practice analogies.",numerical:"Mental math and estimation games."}:{pattern:"Øv matrix-puslespil og sekvenser.",logic:"Prøv Sudoku og syllogismer.",spatial:"3D-puslespil og Tetris.",memory:"Huskespil og talsekvenser.",verbal:"Læs bredt og øv analogier.",numerical:"Hovedregning og estimering."};const sorted=Object.entries(cp).sort((a,b)=>b[1]-a[1]);sorted.slice(0,2).forEach(([k])=>tips.push({type:"strength",cat:n[k],tip:e?`${n[k]} is a strong area!`:`${n[k]} er stærkt!`}));sorted.slice(-2).forEach(([k])=>tips.push({type:"improve",cat:n[k],tip:tm[k]}));return tips;};

/* ═══ COMPONENTS ═══ */
const Bell=({iq})=>{const pts=[];for(let x=55;x<=160;x++){const z=(x-100)/15;pts.push({x,y:Math.exp(-.5*z*z)});}const my=Math.max(...pts.map(p=>p.y));const W=400,H=130,P=28;const s=(x,y)=>({sx:P+(x-55)/105*(W-2*P),sy:H-P-(y/my)*(H-2*P)});const d=pts.map((p,i)=>`${i?'L':'M'}${s(p.x,p.y).sx},${s(p.x,p.y).sy}`).join(' ');const ux=s(Math.max(55,Math.min(160,iq)),0);const uy=s(iq,(pts.find(p=>Math.round(p.x)===Math.round(iq))||{y:0}).y);return(<svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:460}}><defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={C.accent} stopOpacity=".15"/><stop offset="100%" stopColor={C.accent} stopOpacity=".02"/></linearGradient></defs><path d={d+`L${s(160,0).sx},${H-P}L${s(55,0).sx},${H-P}Z`} fill="url(#bg)"/><path d={d} fill="none" stroke={C.accent} strokeWidth="2"/>{[70,85,100,115,130,145].map(v=>{const{sx}=s(v,0);return<g key={v}><line x1={sx} y1={H-P} x2={sx} y2={H-P+4} stroke={C.text4}/><text x={sx} y={H-P+14} fill={C.text3} fontSize="9" textAnchor="middle">{v}</text></g>})}<line x1={ux.sx} y1={H-P} x2={ux.sx} y2={uy.sy} stroke={C.yellow} strokeWidth="2" strokeDasharray="3,3"/><circle cx={ux.sx} cy={uy.sy} r="4.5" fill={C.yellow}/><text x={ux.sx} y={uy.sy-10} fill={C.yellow} fontSize="11" fontWeight="bold" textAnchor="middle">{iq}</text></svg>);};
const CatBar=({label,value,delay=0})=>{const[w,setW]=useState(0);useEffect(()=>{const t=setTimeout(()=>setW(value),delay);return()=>clearTimeout(t);},[value,delay]);const col=value>=80?C.green:value>=60?C.accent:value>=40?C.yellow:C.red;return(<div style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:13}}><span style={{color:C.text3}}>{label}</span><span style={{color:col,fontWeight:600}}>{value}%</span></div><div style={{background:C.border,borderRadius:6,height:6,overflow:"hidden"}}><div style={{width:`${w}%`,height:"100%",borderRadius:6,background:col,transition:"width 1s cubic-bezier(.22,1,.36,1)"}}/></div></div>);};
const ANum=({target})=>{const[c,setC]=useState(0);useEffect(()=>{let s=0;const step=target/120;const iv=setInterval(()=>{s+=step;if(s>=target){setC(target);clearInterval(iv);}else setC(Math.round(s));},16);return()=>clearInterval(iv);},[target]);return<span>{c}</span>;};

/* ═══ MAIN APP ═══ */
function App(){
  const[lang,setLang]=useState("da");const[page,setPage]=useState("home");const[cQ,setCQ]=useState(0);const[ans,setAns]=useState({});const[sTime,setSTime]=useState(null);const[elapsed,setElapsed]=useState(0);const[res,setRes]=useState(null);const[showI,setShowI]=useState(true);const[anim,setAnim]=useState(false);const tRef=useRef(null);
  const t=T[lang];const qs=useMemo(()=>makeQ(lang),[lang]);
  useEffect(()=>{if(page==="test"&&!showI&&sTime){tRef.current=setInterval(()=>setElapsed(Math.floor((Date.now()-sTime)/1000)),1000);}return()=>clearInterval(tRef.current);},[page,showI,sTime]);
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  const go=p=>{setPage(p);window.scrollTo(0,0);};
  const goTest=()=>{setCQ(0);setAns({});setRes(null);setShowI(true);setAnim(false);go("test");};
  const begin=()=>{setShowI(false);setSTime(Date.now());setElapsed(0);};
  const pick=i=>setAns({...ans,[cQ]:i});
  const done=()=>{clearInterval(tRef.current);setRes(calcIQ(ans,qs,Math.floor((Date.now()-sTime)/1000)));setAnim(true);go("results");setTimeout(()=>setAnim(false),2800);};
  const stripe=()=>{window.open(STRIPE_LINK,"_blank");go("paid");};
  const clsCol={"very-superior":C.green,superior:C.blue,"high-average":C.accent,average:C.yellow,"low-average":"#d97706",borderline:C.red,"extremely-low":"#991b1b"};

  /* HOME */
  const Home=()=>(<div style={{maxWidth:700,margin:"0 auto",padding:"60px 20px 80px",textAlign:"center"}}>
    <div className="badge">◈ {t.badge}</div>
    <h1 style={{fontFamily:C.serif,fontSize:"clamp(28px,5vw,46px)",fontWeight:600,lineHeight:1.12,letterSpacing:"-0.03em",marginBottom:16}}>{t.title} <span style={{color:C.accent}}>{t.hl}</span></h1>
    <p style={{fontSize:15,color:C.text2,maxWidth:500,margin:"0 auto 28px",lineHeight:1.7}}>{t.sub}</p>
    <button className="btn-p" style={{padding:"16px 40px",fontSize:15}} onClick={goTest}>{t.cta}</button>
    <div style={{marginTop:56}}>
      <h2 style={{fontFamily:C.serif,fontSize:24,fontWeight:600,marginBottom:32}}>{t.howTitle}</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:16}}>
        {[[t.st1,t.st1d,"✍️"],[t.st2,t.st2d,"📊"],[t.st3,t.st3d,"📄"]].map(([ti,de,ic],i)=>(<div key={i} className="card" style={{padding:24,textAlign:"center"}}><div style={{fontSize:28,marginBottom:10}}>{ic}</div><div style={{fontSize:14,fontWeight:600,marginBottom:6}}>{ti}</div><div style={{fontSize:12,color:C.text3,lineHeight:1.65}}>{de}</div></div>))}
      </div>
    </div>
    <div style={{marginTop:40,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12}}>
      {[[t.f1,t.f1d,"◫"],[t.f2,t.f2d,"⟐"],[t.f3,t.f3d,"⬡"],[t.f4,t.f4d,"◉"]].map(([ti,de,ic],i)=>(<div key={i} className="card" style={{padding:18,textAlign:"left"}}><div style={{fontSize:16,color:C.accent,marginBottom:8}}>{ic}</div><div style={{fontSize:13,fontWeight:600,marginBottom:4}}>{ti}</div><div style={{fontSize:11,color:C.text3,lineHeight:1.6}}>{de}</div></div>))}
    </div>
    <div style={{marginTop:48}}><button className="btn-p" style={{padding:"16px 40px",fontSize:15}} onClick={goTest}>{t.cta}</button></div>
  </div>);

  /* TEST */
  const Test=()=>{
    if(showI)return(<div className="card" style={{padding:40,textAlign:"center",maxWidth:480,margin:"60px auto"}}><div style={{fontSize:40,marginBottom:18}}>🧠</div><h2 style={{fontFamily:C.serif,fontSize:24,fontWeight:600,marginBottom:10}}>{t.instrTitle}</h2><p style={{color:C.text3,lineHeight:1.8,marginBottom:24,fontSize:14}}>{t.instrText}</p><button className="btn-p" onClick={begin}>{t.begin}</button></div>);
    const q=qs[cQ],prog=((cQ+1)/qs.length)*100;const catL={pattern:t.cPattern,logic:t.cLogic,spatial:t.cSpatial,memory:t.cMemory,verbal:t.cVerbal,numerical:t.cNumerical};
    return(<div style={{maxWidth:620,margin:"0 auto",padding:"30px 20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><span style={{color:C.text3,fontSize:13}}>{cQ+1} {t.qOf} {qs.length}</span><div style={{background:C.warm,borderRadius:20,padding:"5px 13px",fontSize:13,color:C.text3}}>⏱ {fmt(elapsed)}</div></div>
      <div style={{height:3,background:C.border,borderRadius:4,marginBottom:24,overflow:"hidden"}}><div style={{width:`${prog}%`,height:"100%",background:C.accent,transition:"width .4s"}}/></div>
      <div className="card" style={{padding:"30px 28px"}}><div style={{fontSize:11,color:C.accent,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,marginBottom:12}}>{catL[q.cat]}</div><div style={{fontSize:16,fontWeight:500,marginBottom:22,lineHeight:1.65}}>{q.q}</div>
        {q.o.map((opt,i)=>(<button key={i} onClick={()=>pick(i)} style={{display:"block",width:"100%",textAlign:"left",background:ans[cQ]===i?C.accentBg:C.bg,border:`1.5px solid ${ans[cQ]===i?C.accentBorder:C.border}`,borderRadius:10,padding:"12px 16px",marginBottom:8,color:ans[cQ]===i?C.accent:C.text2,cursor:"pointer",fontSize:14,fontWeight:ans[cQ]===i?600:400,transition:"all .15s"}}><span style={{color:C.text4,marginRight:10,fontWeight:600}}>{String.fromCharCode(65+i)}</span>{opt}</button>))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:20}}>
        <button className="btn-s" style={{padding:"10px 24px",opacity:cQ===0?.3:1}} onClick={()=>cQ>0&&setCQ(cQ-1)} disabled={cQ===0}>{t.prev}</button>
        {cQ<qs.length-1?<button className="btn-p" style={{padding:"10px 24px",opacity:ans[cQ]===undefined?.4:1}} onClick={()=>ans[cQ]!==undefined&&setCQ(cQ+1)} disabled={ans[cQ]===undefined}>{t.next}</button>:<button className="btn-p" style={{padding:"10px 24px",background:C.green}} onClick={done} disabled={ans[cQ]===undefined}>{t.finish}</button>}
      </div>
    </div>);
  };

  /* FREE RESULTS */
  const Results=()=>{if(!res)return null;const fb=genFeedback(res,lang);
    if(anim)return(<div style={{maxWidth:480,margin:"80px auto",textAlign:"center",padding:20}}>
      <div style={{fontSize:48,marginBottom:20}}>🧠</div>
      <h2 style={{fontFamily:C.serif,fontSize:22,fontWeight:600,marginBottom:14}}>{t.analyzing}...</h2>
      <div style={{height:3,background:C.border,borderRadius:4,overflow:"hidden",maxWidth:280,margin:"0 auto"}}><div style={{width:"100%",height:"100%",background:`linear-gradient(90deg,transparent,${C.accent},transparent)`,backgroundSize:"200% 100%",animation:"shimmer 1.5s ease-in-out infinite"}}/></div>
    </div>);
    return(<div style={{maxWidth:600,margin:"0 auto",padding:"40px 20px"}}>
      <h2 style={{fontFamily:C.serif,fontSize:26,fontWeight:600,textAlign:"center",marginBottom:32}}>{t.resTitle}</h2>
      <div className="card-glow" style={{padding:"36px 32px",marginBottom:24,textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:14}}>{fb.emoji}</div>
        <h3 style={{fontFamily:C.serif,fontSize:22,fontWeight:600,marginBottom:14}}>{fb.hl}</h3>
        <p style={{color:C.text2,fontSize:14,lineHeight:1.8,marginBottom:18}}>{fb.txt}</p>
        <div style={{background:C.accentBg,border:`1px solid ${C.accentBorder}`,borderRadius:10,padding:"12px 18px"}}><p style={{color:C.accent,fontSize:13,fontWeight:600,lineHeight:1.6}}>{fb.hi}</p></div>
      </div>
      {/* BLURRED IQ */}
      <div style={{position:"relative",overflow:"hidden",borderRadius:14,marginBottom:20}}>
        <div style={{filter:"blur(12px)",opacity:.4,pointerEvents:"none",padding:"32px 24px",background:C.card,textAlign:"center"}}>
          <div style={{fontSize:11,color:C.text4,textTransform:"uppercase",letterSpacing:2}}>IQ Score</div>
          <div style={{fontSize:72,fontWeight:700,color:C.accent,lineHeight:1,fontFamily:C.serif}}>???</div>
          <div style={{fontSize:13,color:C.text4,marginTop:8}}>Percentile: ██.█%</div>
        </div>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(250,249,247,.6)",backdropFilter:"blur(2px)"}}><div style={{textAlign:"center"}}><div style={{fontSize:32,marginBottom:6}}>🔒</div><div style={{fontSize:13,color:C.accent,fontWeight:600}}>{lang==="en"?"Your IQ score is ready":"Din IQ-score er klar"}</div></div></div>
      </div>
      {/* BLURRED CATEGORIES */}
      <div style={{position:"relative",overflow:"hidden",borderRadius:14,marginBottom:24}}>
        <div style={{filter:"blur(6px)",opacity:.3,pointerEvents:"none",padding:24,background:C.card}}>
          {["","","","","",""].map((_,i)=><div key={i} style={{marginBottom:8}}><div style={{background:C.border,borderRadius:4,height:5}}><div style={{width:`${30+Math.random()*55}%`,height:"100%",borderRadius:4,background:C.accent}}/></div></div>)}
        </div>
        <div style={{position:"absolute",inset:0,background:"rgba(250,249,247,.5)"}}/>
      </div>
      {/* PAYWALL */}
      <div className="card" style={{padding:32,textAlign:"center",marginBottom:24,border:`1.5px solid ${C.accentBorder}`}}>
        <h3 style={{fontFamily:C.serif,fontSize:20,fontWeight:600,marginBottom:8}}>{t.unlockTitle}</h3>
        <p style={{color:C.accent,fontSize:13,marginBottom:4}}>{fb.tease}</p>
        <p style={{color:C.text3,fontSize:12,marginBottom:18}}>{t.unlockDesc}</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,maxWidth:360,margin:"0 auto 24px",textAlign:"left"}}>
          {t.unlockFeats.map((f,i)=><div key={i} style={{fontSize:12,color:C.text2,display:"flex",alignItems:"center",gap:6}}><span style={{color:C.green,flexShrink:0}}>✓</span>{f}</div>)}
        </div>
        <button className="btn-p" style={{width:"100%",maxWidth:380,padding:15,fontSize:15}} onClick={stripe}>{t.unlockBtn}</button>
        <div style={{display:"flex",justifyContent:"center",gap:14,marginTop:12,fontSize:11,color:C.text4}}><span>🔒 Sikker betaling</span><span>⚡ Øjeblikkelig adgang</span></div>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"center"}}><button className="btn-s" onClick={goTest}>{t.retake}</button><button className="btn-s" onClick={()=>go("home")}>← {t.home}</button></div>
    </div>);
  };

  /* PAID REPORT */
  const Paid=()=>{if(!res)return null;const cc=clsCol[res.cls]||C.text3;const tips=getTips(res.cp,lang);
    return(<div style={{maxWidth:620,margin:"0 auto",padding:"40px 20px"}}>
      <h2 style={{fontFamily:C.serif,fontSize:26,fontWeight:600,textAlign:"center",marginBottom:32}}>{t.paidTitle}</h2>
      <div className="card-glow" style={{padding:36,textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:11,color:C.text4,textTransform:"uppercase",letterSpacing:2,marginBottom:8}}>{t.iqLabel}</div>
        <div style={{fontSize:72,fontWeight:700,lineHeight:1,color:C.accent,fontFamily:C.serif}}><ANum target={res.iq}/></div>
        <div style={{display:"inline-block",padding:"5px 16px",borderRadius:40,background:`${cc}15`,border:`1px solid ${cc}30`,color:cc,fontSize:12,fontWeight:700,marginTop:10}}>{t.cls[res.cls]}</div>
        <div style={{marginTop:12,color:C.text3,fontSize:13}}>{t.pctDesc.replace("{p}",res.pct)}</div>
        <div style={{marginTop:6,color:C.text4,fontSize:12}}>{t.clsDesc[res.cls]}</div>
        <div style={{marginTop:24}}><div style={{fontSize:10,color:C.text4,textTransform:"uppercase",letterSpacing:1.5,marginBottom:10}}>{t.bell}</div><Bell iq={res.iq}/></div>
      </div>
      <div className="card" style={{padding:28,marginBottom:20}}><h3 style={{fontFamily:C.serif,fontSize:17,fontWeight:600,marginBottom:20}}>{t.catTitle}</h3>
        <CatBar label={t.cPattern} value={res.cp.pattern} delay={200}/><CatBar label={t.cLogic} value={res.cp.logic} delay={350}/><CatBar label={t.cSpatial} value={res.cp.spatial} delay={500}/><CatBar label={t.cMemory} value={res.cp.memory} delay={650}/><CatBar label={t.cVerbal} value={res.cp.verbal} delay={800}/><CatBar label={t.cNumerical} value={res.cp.numerical} delay={950}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
        {[[t.iqLabel,res.iq],[t.correct,`${res.cor}/${res.tot}`],[t.time,fmt(res.time)]].map(([l,v],i)=><div key={i} className="card" style={{padding:16,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:C.accent}}>{v}</div><div style={{fontSize:10,color:C.text4,marginTop:3,textTransform:"uppercase",letterSpacing:1}}>{l}</div></div>)}
      </div>
      <div className="card" style={{padding:28,marginBottom:20}}><h3 style={{fontFamily:C.serif,fontSize:17,fontWeight:600,marginBottom:16}}>{t.tipTitle}</h3>
        {tips.map((tip,i)=><div key={i} style={{padding:"10px 14px",background:tip.type==="strength"?"#e8f0ec":"#fef9e7",border:`1px solid ${tip.type==="strength"?"#b8dbc8":"#e5d5a8"}`,borderRadius:10,marginBottom:8}}><div style={{fontSize:11,fontWeight:700,color:tip.type==="strength"?C.green:C.yellow,marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>{tip.type==="strength"?"★":"↑"} {tip.cat}</div><div style={{fontSize:12,color:C.text2,lineHeight:1.6}}>{tip.tip}</div></div>)}
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}><button className="btn-s" onClick={goTest}>{t.retake}</button><button className="btn-s" onClick={()=>go("home")}>← {t.home}</button></div>
    </div>);
  };

  /* NAV SWITCHING: simplified nav during test */
  useEffect(()=>{
    var navEl=document.getElementById('site-nav');
    var footerEl=document.getElementById('site-footer');
    if(page==='test'){
      navEl.setAttribute('data-test-mode','true');
      navEl.innerHTML='';
      footerEl.style.display='none';
      // Re-run nav injection with test mode
      var s=document.createElement('script');s.src='shared/nav.js';s.onload=function(){this.remove()};document.body.appendChild(s);
    } else {
      navEl.removeAttribute('data-test-mode');
      navEl.innerHTML='';
      footerEl.style.display='';
      var s1=document.createElement('script');s1.src='shared/nav.js';s1.onload=function(){this.remove()};document.body.appendChild(s1);
      var s2=document.createElement('script');s2.src='shared/footer.js';s2.onload=function(){this.remove()};document.body.appendChild(s2);
    }
  },[page]);

  /* RENDER */
  return(<React.Fragment>
    <main style={{paddingTop:0}}>{page==="home"&&<Home/>}{page==="test"&&<Test/>}{page==="results"&&<Results/>}{page==="paid"&&<Paid/>}</main>
  </React.Fragment>);
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
