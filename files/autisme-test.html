function scoreQ(q, a) { if (!a) return 0; return q.reverse ? (a === "sd" || a === "dd" ? 1 : 0) : (a === "da" || a === "sa" ? 1 : 0); }
function getCat(t) { if (t >= 32) return "high"; if (t >= 26) return "elevated"; if (t >= 17) return "average"; return "low"; }

  const ans = Object.keys(answers).length;
  const prog = (ans / 50) * 100;

  function gB() { if (cQ > 0) { setAnim("out"); setTimeout(() => { setCQ(p => p - 1); setAnim("in"); }, 200); } }

  if (phase === "intro") {

          <div className="aq-intro-body" style={{ padding: "36px 40px" }}>
            <p style={{ fontSize: 15, lineHeight: 1.8, color: "var(--text-2)", margin: "0 0 20px" }}><strong style={{color:"var(--text)"}}>Autism Spectrum Quotient (AQ)</strong> er et videnskabeligt valideret screeningsværktøj udviklet ved Cambridge Autism Research Centre. 50 spørgsmål fordelt på 5 domæner.</p>
            <div style={{ background: "var(--bg-warm)", border: "1px solid var(--border)", borderRadius: 10, padding: "20px 24px", margin: "24px 0" }}>
              <div style={{ fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: "var(--text-3)", marginBottom: 12, fontWeight: 700 }}>Nøgletal</div>
              <div style={{ display: "flex", gap: 32, flexWrap: "wrap" }}>
                {[{ n: "16,4", l: "Gns. kontrol" }, { n: "26+", l: "Screeningtærskel" }, { n: "32+", l: "Klinisk tærskel" }, { n: "35,8", l: "Gns. autistisk" }].map((d, i) => (<div key={i} style={{ flex: "1 1 120px" }}><div style={{ fontFamily: "var(--serif)", fontSize: 24, fontWeight: 700, color: "var(--text)" }}>{d.n}</div><div style={{ fontSize: 12, color: "var(--text-3)", marginTop: 4 }}>{d.l}</div></div>))}
              </div>
            </div>
            <div style={{ background: "#fef9e7", border: "1px solid #f0d78c", borderRadius: 10, padding: "16px 20px", margin: "24px 0", fontSize: 13, lineHeight: 1.7, color: "#7d6608" }}><strong>Bemærk:</strong> Screeningsredskab — ikke klinisk diagnose. Kun en kvalificeret fagperson kan diagnosticere autisme.</div>
            <div style={{ margin: "28px 0 8px" }}>
              <div style={{ fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: "var(--text-3)", marginBottom: 12, fontWeight: 700 }}>Angiv køn (normdata)</div>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                {[{ v: "male", l: "Mand" }, { v: "female", l: "Kvinde" }, { v: "other", l: "Andet" }].map(g => (<button key={g.v} onClick={() => setGender(g.v)} style={{ flex: 1, minWidth: 100, padding: "14px 16px", border: gender === g.v ? "2px solid var(--bg-dark)" : "1px solid var(--border-2)", borderRadius: 10, background: gender === g.v ? "var(--bg-dark)" : "#fff", color: gender === g.v ? "#faf9f7" : "var(--text-2)", fontSize: 14, cursor: "pointer", fontFamily: "var(--sans)", fontWeight: 500, transition: "all .2s" }}>{g.l}</button>))}
              </div>
            </div>
          </div>
          <div className="aq-intro-footer" style={{ padding: "20px 40px 36px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "flex-end" }}>
            <button onClick={() => gender && setPhase("test")} disabled={!gender} style={{ padding: "14px 40px", fontSize: 15, background: gender ? "var(--bg-dark)" : "var(--border-2)", color: gender ? "#fff" : "var(--text-3)", border: "none", borderRadius: 10, cursor: gender ? "pointer" : "default", fontFamily: "var(--sans)", fontWeight: 600, transition: "all .25s" }}>Start testen →</button>
          </div>
        </div>
      </div>
    );
  }

  if (phase === "test") {
    const q = questions[cQ]; const ca = answers[q.id]; const cf = ans === 50;
    return (
      <div style={{ minHeight: "calc(100vh - 64px)", background: "var(--bg)", fontFamily: "var(--sans)", display: "flex", flexDirection: "column" }}>
        <div style={{ background: "var(--bg-dark)", color: "#faf9f7", padding: "16px 32px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 64, zIndex: 10 }}>
          <div><span style={{ fontSize: 14, opacity: 0.6 }}>AQ-50</span><span style={{ margin: "0 12px", opacity: 0.3 }}>·</span><span style={{ fontSize: 14 }}>{ans}/50</span></div>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}><div style={{ width: 160, height: 4, background: "rgba(255,255,255,0.15)", borderRadius: 2, overflow: "hidden" }}><div style={{ width: prog + "%", height: "100%", background: "#3a7d5e", borderRadius: 2, transition: "width 0.4s" }} /></div><span style={{ fontSize: 13, opacity: 0.6 }}>{Math.round(prog)}%</span></div>
        </div>
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "40px 20px" }}>
          <div style={{ maxWidth: 640, width: "100%", opacity: anim === "in" ? 1 : 0, transform: anim === "in" ? "translateY(0)" : "translateY(12px)", transition: "all 0.2s" }}>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "var(--autism-bg)", padding: "6px 14px", borderRadius: 20, fontSize: 12, color: "var(--autism)", marginBottom: 20, fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase" }}>{domainIcons[q.domain]} {domainLabels[q.domain]}</div>
            <div style={{ marginBottom: 36 }}>
              <div style={{ fontFamily: "var(--serif)", fontSize: 64, fontWeight: 700, color: "var(--border)", lineHeight: 1, marginBottom: 8 }}>{String(q.id).padStart(2, "0")}</div>
              <p style={{ fontFamily: "var(--serif)", fontSize: 22, lineHeight: 1.5, color: "var(--text)", margin: 0 }}>{q.text}</p>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {options.map(o => { const sel = ca === o.value; return (<button key={o.value} onClick={() => hA(q.id, o.value)} style={{ display: "flex", alignItems: "center", gap: 16, padding: "18px 24px", background: sel ? "var(--bg-dark)" : "#fff", color: sel ? "#faf9f7" : "var(--text-2)", border: sel ? "2px solid var(--bg-dark)" : "1px solid var(--border-2)", borderRadius: 10, cursor: "pointer", fontSize: 16, textAlign: "left", fontFamily: "var(--sans)", width: "100%", fontWeight: 500, transition: "all .15s" }}><div style={{ width: 20, height: 20, borderRadius: 10, border: sel ? "6px solid #3a7d5e" : "2px solid var(--text-4)", background: sel ? "var(--bg-dark)" : "#fff", flexShrink: 0, transition: "all .15s" }} />{o.label}</button>); })}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 32, paddingTop: 20, borderTop: "1px solid var(--border)" }}>
              <button onClick={gB} disabled={cQ === 0} style={{ padding: "10px 20px", fontSize: 14, background: "transparent", border: "1px solid var(--border-2)", color: cQ === 0 ? "var(--text-4)" : "var(--text-2)", borderRadius: 8, cursor: cQ === 0 ? "default" : "pointer", fontFamily: "var(--sans)", fontWeight: 500 }}>← Forrige</button>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
                {Array.from({ length: 50 }, (_, i) => (<div key={i} onClick={() => { setAnim("out"); setTimeout(() => { setCQ(i); setAnim("in"); }, 150); }} style={{ width: i === cQ ? 8 : 4, height: i === cQ ? 8 : 4, borderRadius: "50%", background: answers[i + 1] ? "var(--bg-dark)" : i === cQ ? "var(--autism)" : "var(--border-2)", cursor: "pointer", transition: "all .15s" }} />))}
              </div>
              {cQ < 49 ? (<button onClick={() => { if (ca) { setAnim("out"); setTimeout(() => { setCQ(p => p + 1); setAnim("in"); }, 200); } }} disabled={!ca} style={{ padding: "10px 20px", fontSize: 14, background: ca ? "var(--bg-dark)" : "transparent", color: ca ? "#fff" : "var(--text-4)", border: ca ? "none" : "1px solid var(--border-2)", borderRadius: 8, cursor: ca ? "pointer" : "default", fontFamily: "var(--sans)", fontWeight: 500 }}>Næste →</button>) : (<button onClick={() => cf && setPhase("results")} disabled={!cf} style={{ padding: "12px 28px", fontSize: 15, background: cf ? "var(--bg-dark)" : "transparent", color: cf ? "#fff" : "var(--text-4)", border: cf ? "none" : "1px solid var(--border-2)", borderRadius: 10, cursor: cf ? "pointer" : "default", fontFamily: "var(--sans)", fontWeight: 600 }}>Se resultater</button>)}
            </div>
            {!cf && cQ === 49 && <div style={{ marginTop: 16, fontSize: 13, color: "var(--text-3)", textAlign: "center" }}>Du mangler {50 - ans} spørgsmål.</div>}
          </div>
        </div>
      </div>
    );
  }

  if (phase === "results") {
    const { t: total, d: ds } = calc();
    const cat = getCat(total); const cs = CS[cat]; const pr = profileData[cat];
    const cm = gender === "male" ? 17.8 : gender === "female" ? 15.4 : 16.4;
    const catLabel = cat === "high" ? "Markant" : cat === "elevated" ? "Forhøjet" : cat === "average" ? "Typisk" : "Lav";

    return (
      <div style={{ minHeight: "calc(100vh - 64px)", background: "var(--bg)", fontFamily: "var(--sans)", padding: "40px 20px" }}>
        <div style={{ maxWidth: 740, margin: "0 auto" }}>
          <div className="aq-result-header" style={{ background: "var(--bg-dark)", color: "#faf9f7", padding: "40px 40px 32px", borderRadius: "14px 14px 0 0" }}>
            <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", opacity: 0.5, marginBottom: 12, fontWeight: 600 }}>Resultatrapport · AQ-50</div>
            <h1 style={{ fontFamily: "var(--serif)", fontSize: 28, fontWeight: 600, margin: 0 }}>Autism Spectrum Quotient</h1>
            <div style={{ fontSize: 14, opacity: 0.6, marginTop: 8 }}>Baron-Cohen et al. (2001) · Cambridge Autism Research Centre</div>
          </div>

          <div style={{ background: "#fff", border: "1px solid var(--border)", borderTop: "none", padding: "36px 40px" }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 36, flexWrap: "wrap" }}>
              <div style={{ textAlign: "center", minWidth: 140 }}>
                <div style={{ fontFamily: "var(--serif)", fontSize: 72, fontWeight: 700, color: cs.color, lineHeight: 1 }}>{total}</div>
                <div style={{ fontSize: 14, color: "var(--text-3)", marginTop: 4 }}>af 50</div>
                <div style={{ marginTop: 12, display: "inline-block", padding: "6px 16px", borderRadius: 20, background: cs.bg, border: "1px solid " + cs.border, color: cs.color, fontSize: 13, fontWeight: 600 }}>{catLabel}</div>
              </div>
              <div style={{ flex: 1, minWidth: 280 }}>
                <div style={{ fontFamily: "var(--serif)", fontSize: 18, fontWeight: 600, color: "var(--text)", marginBottom: 4 }}>{pr.title}</div>
                <div style={{ fontSize: 13, color: "var(--text-3)", marginBottom: 16 }}>{pr.subtitle}</div>
                <div style={{ position: "relative", height: 40, marginBottom: 8 }}>
                  <div style={{ position: "absolute", top: 16, left: 0, right: 0, height: 8, background: "linear-gradient(to right, #a9cfe3 0%, #a3d9b1 33%, #f0d78c 60%, #e6a09a 100%)", borderRadius: 4 }} />
                  <div style={{ position: "absolute", top: 4, left: Math.min((total / 50) * 100, 98) + "%", transform: "translateX(-50%)", transition: "left 1s cubic-bezier(0.22,1,0.36,1)" }}><div style={{ width: 20, height: 20, borderRadius: "50%", background: "var(--bg-dark)", border: "3px solid #fff", boxShadow: "0 2px 6px rgba(0,0,0,0.2)" }} /></div>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "var(--text-3)" }}><span>0</span><span>Gns. ({cm})</span><span>Screen (26)</span><span>Klinisk (32)</span><span>50</span></div>
              </div>
            </div>
          </div>

          <Sec icon="📋" title="Samlet vurdering"><p style={{ fontSize: 14.5, lineHeight: 1.8, color: "var(--text-2)", margin: 0 }}>{pr.summary}</p></Sec>

          <Sec icon="📊" title="Domæneanalyse">
            <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
              {Object.entries(ds).map(([d, s]) => { const di = getDI(s); return (<div key={d}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}><div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 18 }}>{domainIcons[d]}</span><span style={{ fontFamily: "var(--serif)", fontSize: 15, fontWeight: 600, color: "var(--text)" }}>{domainLabels[d]}</span></div><div style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ fontSize: 12, padding: "3px 10px", borderRadius: 12, background: di.color + "18", color: di.color, fontWeight: 600 }}>{di.label}</span><span style={{ fontFamily: "var(--serif)", fontSize: 18, fontWeight: 700, color: "var(--text)" }}>{s}<span style={{ fontSize: 12, fontWeight: 400, color: "var(--text-3)" }}>/10</span></span></div></div><Bar value={s} max={10} color={di.color} /><p style={{ fontSize: 12, color: "var(--text-3)", margin: "6px 0 0", lineHeight: 1.5 }}>{domainDescriptions[d]}</p></div>); })}
            </div>
          </Sec>

          <Sec icon="💪" title="Dine styrker">
            {pr.strengths.map((s, i) => <Card key={i} title={s.title} text={s.text} accent="#2c7a3e" />)}
          </Sec>

          <Sec icon="⚡" title="Udfordringer">
            {pr.challenges.map((c, i) => <Card key={i} title={c.title} text={c.text} accent={cs.color} />)}
          </Sec>

          {Object.entries(ds).some(([, s]) => s >= 5) && (
            <Sec icon="🎯" title="Domænespecifik feedback">
              {Object.entries(ds).map(([d, s]) => { const lv = getDL(s); if (!lv) return null; const fb = domainFeedback[d]?.[lv]; if (!fb) return null; return (<div key={d} style={{ marginBottom: 24, background: "var(--bg-warm)", border: "1px solid var(--border)", borderRadius: 10, padding: "20px 24px" }}><div style={{ fontFamily: "var(--serif)", fontSize: 15, fontWeight: 600, color: "var(--text)", marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}><span>{domainIcons[d]}</span> {domainLabels[d]} ({s}/10)</div><div style={{ fontSize: 13.5, lineHeight: 1.7, color: "var(--text-2)" }}><div style={{ marginBottom: 8 }}><strong style={{ color: "#2c7a3e" }}>Styrke:</strong> {fb.s}</div><div style={{ marginBottom: 8 }}><strong style={{ color: "#d68910" }}>Udfordring:</strong> {fb.c}</div><div><strong style={{ color: "#2471a3" }}>Anbefaling:</strong> {fb.t}</div></div></div>); })}
            </Sec>
          )}

          <Sec icon="🧠" title="Evidensbaserede øvelser">
            {pr.exercises.map((e, i) => <Card key={i} title={e.title} text={e.text} accent="#2471a3" />)}
          </Sec>

          <Sec icon="💼" title="Faglige styrkeområder"><p style={{ fontSize: 14.5, lineHeight: 1.8, color: "var(--text-2)", margin: 0 }}>{pr.careers}</p></Sec>

          <Sec icon="📈" title="Normative referencedata">
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
              <thead><tr style={{ borderBottom: "2px solid var(--text)" }}><th style={{ textAlign: "left", padding: "8px 0", fontWeight: 600 }}>Gruppe</th><th style={{ textAlign: "center", padding: "8px 0", fontWeight: 600 }}>Gns.</th><th style={{ textAlign: "center", padding: "8px 0", fontWeight: 600 }}>Din</th></tr></thead>
              <tbody>{[{ g: "Generel befolkning", s: "16,4" }, { g: "Screeningtærskel", s: "26" }, { g: "Klinisk tærskel", s: "32" }, { g: "Autistiske voksne", s: "35,8" }].map((r, i) => (<tr key={i} style={{ borderBottom: "1px solid var(--border)" }}><td style={{ padding: "10px 0", color: "var(--text-2)" }}>{r.g}</td><td style={{ textAlign: "center", padding: "10px 0", color: "var(--text-3)", fontFamily: "var(--serif)" }}>{r.s}</td><td style={{ textAlign: "center", padding: "10px 0", fontWeight: 700, color: cs.color, fontFamily: "var(--serif)" }}>{total}</td></tr>))}</tbody>
            </table>
          </Sec>

          <Sec icon="📚" title="Videnskabelige referencer">
            <div style={{ fontSize: 12, lineHeight: 1.8, color: "var(--text-3)" }}>
              {["Baron-Cohen, S., et al. (2001). The Autism-Spectrum Quotient (AQ). J. Autism Dev. Disord., 31(1), 5–17.", "Baron-Cohen, S., et al. (2009). Talent in autism: hyper-systemizing. Phil. Trans. R. Soc. B, 364, 1377–1383.", "Mottron, L., et al. (2006). Enhanced perceptual functioning. J. Autism Dev. Disord., 36(1), 27–43.", "Lundqvist & Lindner (2017). AQ Rasch Validation. J. Autism Dev. Disord., 47, 2080–2091.", "Woods & Estes (2023). SASSI. Frontiers in Psychiatry, 14.", "Simione et al. (2024). MBIs for ASD. Brain Sciences, 14(10), 1001.", "Sizoo & Kuiper (2017). CBT and MBSR for adults with ASD. Res. Autism Spectr. Disord., 36, 34–46.", "Happé & Frith (2006). Weak coherence account. J. Autism Dev. Disord., 36, 5–25.", "Wallace et al. (2016). Executive Functions. J. Autism Dev. Disord., 46, 3575–3589.", "Ruzich et al. (2015). AQ meta-review. Mol. Autism, 6, 2."].map((r, i) => <p key={i} style={{ margin: "0 0 4px" }}>{r}</p>)}
            </div>
          </Sec>

          <div className="aq-result-disclaimer" style={{ background: "#fef9e7", border: "1px solid #f0d78c", borderTop: "none", padding: "24px 40px", borderRadius: "0 0 14px 14px" }}>
            <p style={{ fontSize: 13, lineHeight: 1.7, color: "#7d6608", margin: 0 }}><strong>Ansvarsfraskrivelse:</strong> Screeningsredskab — ikke klinisk diagnose. Individuel variation er betydelig. I Danmark kan din læge henvise til specialiseret autismeudredning.</p>
          </div>

          <div style={{ textAlign: "center", marginTop: 32 }}>
            <button onClick={() => { setAnswers({}); setCQ(0); setGender(null); setPhase("intro"); }} style={{ padding: "14px 36px", fontSize: 15, background: "transparent", border: "1.5px solid var(--border-2)", color: "var(--text-2)", borderRadius: 10, cursor: "pointer", fontFamily: "var(--sans)", fontWeight: 500 }}>Tag testen igen</button>
          </div>

          <div style={{ textAlign: "center", marginTop: 32, marginBottom: 40 }}>
            <p style={{ fontFamily: "var(--serif)", fontSize: 16, fontWeight: 500, color: "var(--text)", marginBottom: 16 }}>Andre tests du måske er interesseret i</p>
            <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
              <a href="adhd-screening.html" style={{ padding: "10px 20px", background: "#eaf1f7", color: "#2e6b9e", borderRadius: 8, fontSize: 13, fontWeight: 600, textDecoration: "none" }}>⚡ ADHD-screening</a>
              <a href="iq-test.html" style={{ padding: "10px 20px", background: "#f0ebf5", color: "#6b4c9a", borderRadius: 8, fontSize: 13, fontWeight: 600, textDecoration: "none" }}>◈ IQ-test</a>
            </div>
          </div>

          <div style={{ textAlign: "center", marginBottom: 40, fontSize: 12, color: "var(--text-4)" }}>AQ-50 · Baron-Cohen et al. (2001) · Dansk oversættelse til screeningsformål</div>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AutismeTest/>);
</script>
</body>
</html>
